<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gestiónPyME — Control de Gestión</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F2ED;--surface:#FDFCFA;--surface2:#F9F7F3;
  --border:#E3DDD5;--border2:#CAC4BB;
  --text:#1A1714;--text2:#6B6560;--text3:#9E9892;
  --accent:#2A5C45;--accent-l:#E8F0EC;--accent-d:#1E4433;
  --red:#C4531A;--red-l:#FAF0EA;
  --gold:#C9950C;--gold-l:#FBF5E0;
  --blue:#1A5FB4;--blue-l:#EEF3FB;
  --purple:#6B3FA0;--purple-l:#F3EEFB;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:10px;--r-sm:6px;--r-lg:14px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;}

/* ── HEADER ── */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:var(--shadow);}
.logo{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;letter-spacing:-.01em;}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;}
.vbadge{font-size:10px;font-family:var(--mono);background:var(--accent-l);color:var(--accent);padding:2px 6px;border-radius:4px;font-weight:500;}
.nav{display:flex;gap:1px;align-items:center;}
.ns{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3);padding:5px 11px;border-radius:20px;cursor:default;white-space:nowrap;transition:all .15s;}
.ns.active{color:var(--accent);background:var(--accent-l);font-weight:500;}
.ns.done{color:var(--text2);cursor:pointer;}
.ns.done:hover{background:var(--bg);}
.ns-n{width:17px;height:17px;border-radius:50%;border:1px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0;}
.ns.done .ns-n{background:var(--accent);border-color:var(--accent);color:#fff;}
.sep{color:var(--border2);font-size:10px;padding:0 1px;}

/* ── LAYOUT ── */
.main{max-width:980px;margin:0 auto;padding:28px 24px 60px;}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow);}
.card-hdr{padding:20px 24px 16px;border-bottom:1px solid var(--border);}
.slabel{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--accent);text-transform:uppercase;margin-bottom:4px;}
.stitle{font-size:19px;font-weight:600;letter-spacing:-.02em;}
.ssub{font-size:13px;color:var(--text2);margin-top:3px;}

/* ── STEP 1: FILE MODULES ── */
.modules-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:20px 24px;}
.mod{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;transition:all .15s;position:relative;}
.mod.loaded{border-color:var(--accent);background:var(--accent-l);}
.mod.optional{border-style:dashed;}
.mod-icon{font-size:20px;margin-bottom:8px;}
.mod-title{font-size:13px;font-weight:600;margin-bottom:2px;}
.mod-desc{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.5;}
.mod-tag{display:inline-block;font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:3px;margin-bottom:8px;font-weight:500;}
.tag-req{background:var(--accent-l);color:var(--accent);}
.tag-opt{background:var(--gold-l);color:var(--gold);}
.mod-btns{display:flex;gap:6px;flex-wrap:wrap;}
.mod-status{font-size:11px;color:var(--accent);font-weight:500;margin-top:6px;display:flex;align-items:center;gap:4px;}

/* ── DROPZONE ── */
.dropzone{border:1.5px dashed var(--border2);border-radius:var(--r-sm);padding:10px 12px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface);font-size:12px;color:var(--text2);position:relative;}
.dropzone:hover{border-color:var(--accent);background:var(--accent-l);color:var(--accent);}
.dropzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}

/* ── TEMPLATE BOX ── */
.tpl-bar{background:var(--gold-l);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.tpl-txt{font-size:13px;color:#7A5C0A;}
.tpl-txt strong{font-weight:600;}

/* ── PASTE ── */
.paste-section{padding:0 24px 20px;border-top:1px solid var(--border);margin-top:4px;padding-top:16px;}
.divrow{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.divline{flex:1;height:1px;background:var(--border);}
.divtxt{font-size:11px;color:var(--text3);}
textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;font-family:var(--mono);font-size:12px;color:var(--text);resize:vertical;min-height:72px;outline:none;transition:border .15s;line-height:1.6;}
textarea:focus{border-color:var(--accent);}
textarea::placeholder{color:var(--text3);}

/* ── TABLE ── */
.tscroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{background:var(--bg);padding:7px 12px;text-align:left;font-weight:600;color:var(--text2);font-size:11px;letter-spacing:.04em;border-bottom:1px solid var(--border);white-space:nowrap;}
thead th.r{text-align:right;}
tbody td{padding:7px 12px;border-bottom:1px solid var(--border);color:var(--text);}
tbody td.r{text-align:right;font-family:var(--mono);font-size:12px;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--accent-l);}

/* ── COL GRID ── */
.col-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;padding:16px 24px;}
.col-card{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);padding:12px;transition:all .15s;}
.col-card.mapped{border-color:var(--accent);background:var(--accent-l);}
.col-name{font-family:var(--mono);font-size:12px;font-weight:500;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.col-sample{font-size:11px;color:var(--text3);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
select{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-sm);padding:5px 7px;font-family:var(--font);font-size:12px;color:var(--text);cursor:pointer;outline:none;}
select:focus{border-color:var(--accent);}
.cbadge{display:inline-flex;align-items:center;font-size:10px;padding:2px 6px;border-radius:3px;font-weight:500;margin-top:5px;}
.cv{background:var(--accent-l);color:var(--accent);}
.cc{background:var(--red-l);color:var(--red);}
.cf{background:var(--gold-l);color:var(--gold);}
.ccl{background:var(--blue-l);color:var(--blue);}
.cp{background:var(--purple-l);color:var(--purple);}
.cq{background:#EEF5FB;color:#1A5FB4;}

/* ── SAVE BANNER ── */
.save-bar{padding:14px 24px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface2);}
.save-bar.saved{background:var(--accent-l);}

/* ── DASHBOARD ── */
.demo-note{background:var(--gold-l);border-bottom:1px solid #E8C84A;padding:9px 24px;font-size:12px;color:#7A5C0A;display:flex;align-items:center;gap:6px;}
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);}
.klbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;}
.kval{font-size:21px;font-weight:600;font-family:var(--mono);letter-spacing:-.02em;}
.kdelta{font-size:11px;margin-top:4px;}
.up{color:var(--accent);}
.dn{color:var(--red);}
.warn{color:var(--gold);}

/* ── TABS ── */
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0;}
.tab{padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:var(--font);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab:hover:not(.active){color:var(--text);}

.ptabs{display:flex;gap:4px;margin-bottom:16px;}
.ptab{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s;font-family:var(--font);}
.ptab.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* ── CHARTS GRID ── */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.cfull{grid-column:1/-1;}
.ccrd{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow);}
.ctitle{font-size:13px;font-weight:600;margin-bottom:2px;letter-spacing:-.01em;}
.csub{font-size:11px;color:var(--text3);margin-bottom:14px;}
.legrow{display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap;}
.legitem{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);}
.legdot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.rankn{font-size:11px;font-family:var(--mono);color:var(--text3);}
.barinl{height:4px;border-radius:2px;margin-top:3px;transition:width .4s;}
.mgb{display:inline-block;padding:1px 7px;border-radius:3px;font-size:10px;font-weight:600;font-family:var(--mono);}
.mgh{background:var(--accent-l);color:var(--accent);}
.mgm{background:var(--gold-l);color:var(--gold);}
.mgl{background:var(--red-l);color:var(--red);}
.ibox{background:var(--gold-l);border:1px solid #E8C84A;border-radius:var(--r-sm);padding:12px 14px;margin-top:14px;font-size:12px;color:#5A4208;line-height:1.6;}
.ibox strong{font-weight:600;}

/* ── CASCADE TABLE ── */
.cascade{width:100%;border-collapse:collapse;font-size:13px;}
.cascade tr td{padding:8px 12px;border-bottom:1px solid var(--border);}
.cascade tr:last-child td{border-bottom:none;}
.cascade .lbl{color:var(--text2);}
.cascade .val{text-align:right;font-family:var(--mono);font-weight:500;}
.cascade .sub{background:var(--bg);}
.cascade .sub .lbl{padding-left:20px;font-size:12px;color:var(--text3);}
.cascade .total-row td{background:var(--accent-l);font-weight:600;color:var(--accent);}
.cascade .warn-row td{background:var(--red-l);color:var(--red);font-weight:600;}
.cascade .sep-row td{background:var(--bg);padding:4px 12px;font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);}

/* ── AI CHAT ── */
.chat-wrap{display:flex;flex-direction:column;height:460px;}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
.msg{max-width:80%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;}
.msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:3px;}
.msg.ai{align-self:flex-start;background:var(--bg);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:3px;}
.msg.ai.thinking{color:var(--text3);font-style:italic;}
.chat-input-row{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--surface2);}
.chat-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:8px 16px;font-family:var(--font);font-size:13px;color:var(--text);outline:none;transition:border .15s;}
.chat-input:focus{border-color:var(--accent);}
.chat-input::placeholder{color:var(--text3);}
.chat-suggestions{padding:8px 16px 0;display:flex;gap:6px;flex-wrap:wrap;}
.sug{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;}
.sug:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-l);}
.api-note{font-size:11px;color:var(--text3);padding:6px 16px;text-align:center;border-top:1px solid var(--border);}
.api-key-row{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--gold-l);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.api-key-row label{font-size:12px;color:#7A5C0A;font-weight:500;white-space:nowrap;}
.api-key-input{flex:1;min-width:200px;background:#fff;border:1px solid #E8C84A;border-radius:var(--r-sm);padding:6px 10px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none;}

/* ── CTA BAR ── */
.ctabar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:4px;box-shadow:var(--shadow);}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;background:var(--accent);border:none;border-radius:var(--r-sm);font-family:var(--font);font-size:13px;font-weight:500;color:#fff;cursor:pointer;transition:all .15s;}
.btn:hover{background:var(--accent-d);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn.sm{padding:6px 12px;font-size:12px;}
.btn.outline{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn.outline:hover{border-color:var(--text2);color:var(--text);background:transparent;}
.btn.gold{background:var(--gold);color:#fff;}
.btn.gold:hover{background:#A87A0A;}
.btn.send{padding:8px 14px;border-radius:20px;}
.btng{background:none;border:none;font-size:12px;color:var(--text3);cursor:pointer;text-decoration:underline;font-family:var(--font);}
.note{background:var(--accent-l);border:1px solid var(--accent);border-radius:var(--r-sm);padding:9px 16px;margin:12px 24px 0;font-size:13px;color:var(--accent);font-weight:500;}
.chart-svg{display:block;width:100%;overflow:visible;}

@media(max-width:680px){
  .kgrid{grid-template-columns:1fr 1fr;}
  .cgrid{grid-template-columns:1fr;}
  .cfull{grid-column:1;}
  .modules-grid{grid-template-columns:1fr;}
  .main{padding:16px 12px 48px;}
  .hdr{padding:0 12px;}
  .ns span{display:none;}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════════════════
var TOTAL = 12000000;
var CLIENTES = [
  {nombre:'ElectroMax SA',       pct:.30,margen:.20,categoria:'Celulares'},
  {nombre:'HogarPlus SRL',       pct:.15,margen:.30,categoria:'Línea blanca'},
  {nombre:'Distribuidora Norte', pct:.07,margen:.35,categoria:'Varios'},
  {nombre:'Almacén Central',     pct:.07,margen:.35,categoria:'Varios'},
  {nombre:'Kiosco del Centro',   pct:.06,margen:.35,categoria:'Varios'},
  {nombre:'Ferretería Roca',     pct:.06,margen:.35,categoria:'Varios'},
  {nombre:'Super La Esquina',    pct:.06,margen:.35,categoria:'Varios'},
  {nombre:'MiniMarket 24hs',     pct:.05,margen:.35,categoria:'Varios'},
  {nombre:'El Buen Precio',      pct:.05,margen:.35,categoria:'Varios'},
  {nombre:'Resto clientes',      pct:.09,margen:.35,categoria:'Varios'},
].map(function(c){return Object.assign({},c,{
  ventas:Math.round(TOTAL*c.pct),
  costo:Math.round(TOTAL*c.pct*(1-c.margen)),
  ganancia:Math.round(TOTAL*c.pct*c.margen)
});});

var MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
var FACT=[.065,.060,.080,.075,.085,.080,.090,.088,.082,.095,.105,.095];
var DATA_M=MESES.map(function(mes,i){return{mes:mes,ventas:Math.round(TOTAL*FACT[i]),costos:Math.round(TOTAL*FACT[i]*.724)};});
var DATA_T=[
  {mes:'Q1',ventas:DATA_M.slice(0,3).reduce(function(s,d){return s+d.ventas;},0),costos:DATA_M.slice(0,3).reduce(function(s,d){return s+d.costos;},0)},
  {mes:'Q2',ventas:DATA_M.slice(3,6).reduce(function(s,d){return s+d.ventas;},0),costos:DATA_M.slice(3,6).reduce(function(s,d){return s+d.costos;},0)},
  {mes:'Q3',ventas:DATA_M.slice(6,9).reduce(function(s,d){return s+d.ventas;},0),costos:DATA_M.slice(6,9).reduce(function(s,d){return s+d.costos;},0)},
  {mes:'Q4',ventas:DATA_M.slice(9,12).reduce(function(s,d){return s+d.ventas;},0),costos:DATA_M.slice(9,12).reduce(function(s,d){return s+d.costos;},0)},
];

// Cascade financiero de ejemplo
var CASCADE = {
  ventas: 12000000,
  costosDirectos: 1440000,   // fletes, comisiones (12%)
  costosVariables: 6840000,  // materia prima + MOD (57%)
  costosFijos: 1560000,      // sueldos, alquiler, servicios (13%)
};
CASCADE.margenBruto = CASCADE.ventas - CASCADE.costosDirectos;
CASCADE.margenContrib = CASCADE.margenBruto - CASCADE.costosVariables;
CASCADE.resultadoOp = CASCADE.margenContrib - CASCADE.costosFijos;

var CATS=[
  {v:'',l:'— Sin categoría —',b:''},
  {v:'fecha',l:'📅 Fecha',b:'cf'},
  {v:'ventas',l:'💰 Ventas',b:'cv'},
  {v:'costos',l:'📦 Costos',b:'cc'},
  {v:'cliente',l:'👤 Cliente',b:'ccl'},
  {v:'producto',l:'🏷️ Producto',b:'cp'},
  {v:'cantidad',l:'🔢 Cantidad',b:'cq'},
];

var MODULES = [
  {id:'ventas',    icon:'📊', title:'Ventas',                    desc:'Facturación por cliente, producto y fecha.',          tag:'Requerido', tagClass:'tag-req', freq:'Mensual'},
  {id:'directos',  icon:'🚚', title:'Costos directos x cliente', desc:'Fletes, comisiones, descuentos, financiación.',       tag:'Requerido', tagClass:'tag-req', freq:'Mensual'},
  {id:'receta',    icon:'⚙️',  title:'Receta por producto',       desc:'Insumos y cantidad por unidad fabricada.',            tag:'Opcional',  tagClass:'tag-opt', freq:'Una vez'},
  {id:'manoobra',  icon:'👷', title:'Mano de obra directa',      desc:'Horas por sector y costo por hora mensual.',          tag:'Opcional',  tagClass:'tag-opt', freq:'Mensual'},
  {id:'fijos',     icon:'🏢', title:'Costos fijos',              desc:'Sueldos, alquiler, servicios, amortizaciones.',       tag:'Requerido', tagClass:'tag-req', freq:'Mensual'},
];

var DEMO_VENTAS='Fecha\tCliente\tProducto\tCategoria\tPrecio_Unit\tCantidad\tTotal\nEne-2024\tElectroMax SA\tiPhone 15\tCelulares\t350000\t10\t3500000\nEne-2024\tHogarPlus SRL\tHeladera 320L\tLínea blanca\t180000\t6\t1080000\nFeb-2024\tKiosco del Centro\tArroz 1kg\tAlimentos\t850\t200\t170000\nFeb-2024\tDistribuidora Norte\tDetergente 1L\tLimpieza\t1200\t150\t180000\nMar-2024\tAlmacén Central\tCoca Cola 2L\tBebidas\t1500\t100\t150000';

// ═══════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════
var S = {
  step: 1,
  activeTab: 'dashboard',
  files: {},       // {ventas:{headers,rows,name}, directos:{...}, ...}
  mapping: {},
  mappingSaved: false,
  periodo: 'mensual',
  pasteText: '',
  tip: null,
  chatMsgs: [
    {role:'ai', text:'¡Hola! Soy tu asistente de gestión. Podés preguntarme sobre tus ventas, márgenes, clientes o cualquier número del dashboard. ¿En qué te ayudo?'}
  ],
  chatInput: '',
  apiKey: '',
  chatLoading: false,
};

function setState(patch){Object.assign(S,patch);render();}

// ═══════════════════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════════════════
function fmtK(n){return n>=1000000?'$'+(n/1e6).toFixed(1)+'M':'$'+(n/1000).toFixed(0)+'K';}
function fmtPct(n){return n.toFixed(1)+'%';}
function pct(a,b){return b?Math.round(a/b*100):0;}

function guessCategory(col){
  var n=col.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if(/fecha|date|mes|periodo/.test(n))return'fecha';
  if(/venta|ingreso|precio|importe|total|factura/.test(n))return'ventas';
  if(/costo|gasto|cmp/.test(n))return'costos';
  if(/cliente|razon|empresa|nombre/.test(n))return'cliente';
  if(/producto|articulo|item|categoria/.test(n))return'producto';
  if(/cantidad|qty|unidad/.test(n))return'cantidad';
  return'';
}

function parseCSV(text){
  var lines=text.trim().split('\n').filter(function(l){return l.trim();});
  if(lines.length<2)return null;
  var sep=lines[0].indexOf('\t')>=0?'\t':lines[0].indexOf(';')>=0?';':',';
  var headers=lines[0].split(sep).map(function(h){return h.trim().replace(/^["']|["']$/g,'');});
  var rows=lines.slice(1).map(function(l){
    var vals=l.split(sep).map(function(v){return v.trim().replace(/^["']|["']$/g,'');});
    var row={};headers.forEach(function(h,i){row[h]=vals[i]||'';});return row;
  });
  return{headers:headers,rows:rows};
}

function getMgC(p){return p>=35?'mgh':p>=28?'mgm':'mgl';}
function loadedCount(){return Object.keys(S.files).length;}
function mappedCount(){return Object.values(S.mapping).filter(function(v){return v&&v!=='';}).length;}

function areaChart(data,w,h){
  var pad={t:10,r:10,b:26,l:54};
  var cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
  var maxV=Math.max.apply(null,data.map(function(d){return d.ventas;}))*1.1;
  var xs=data.map(function(_,i){return pad.l+i/(data.length-1)*cw;});
  function yv(d){return pad.t+ch-(d.ventas/maxV)*ch;}
  function yc(d){return pad.t+ch-(d.costos/maxV)*ch;}
  var pV='M'+xs.map(function(x,i){return x.toFixed(1)+','+yv(data[i]).toFixed(1);}).join('L');
  var pC='M'+xs.map(function(x,i){return x.toFixed(1)+','+yc(data[i]).toFixed(1);}).join('L');
  var fV=pV+'L'+xs[xs.length-1].toFixed(1)+','+(pad.t+ch)+'L'+xs[0].toFixed(1)+','+(pad.t+ch)+'Z';
  var fC=pC+'L'+xs[xs.length-1].toFixed(1)+','+(pad.t+ch)+'L'+xs[0].toFixed(1)+','+(pad.t+ch)+'Z';
  var yticks=[0,.25,.5,.75,1].map(function(p){return{y:(pad.t+ch-p*ch).toFixed(1),val:fmtK(maxV*p)};});
  var tipH='';
  if(S.tip){
    var tx=Math.min(S.tip.x+8,w-130),ty=Math.max(S.tip.y-8,pad.t);
    tipH='<line x1="'+S.tip.x+'" y1="'+pad.t+'" x2="'+S.tip.x+'" y2="'+(pad.t+ch)+'" stroke="#CAC4BB" stroke-width="1"/>'
      +'<rect x="'+tx+'" y="'+ty+'" width="122" height="72" rx="6" fill="#FDFCFA" stroke="#E3DDD5"/>'
      +'<text x="'+(tx+8)+'" y="'+(ty+15)+'" font-size="11" font-weight="600" fill="#1A1714" font-family="DM Sans,sans-serif">'+S.tip.d.mes+'</text>'
      +'<text x="'+(tx+8)+'" y="'+(ty+30)+'" font-size="11" fill="#2A5C45" font-family="DM Sans,sans-serif">Ventas: '+fmtK(S.tip.d.ventas)+'</text>'
      +'<text x="'+(tx+8)+'" y="'+(ty+45)+'" font-size="11" fill="#C4531A" font-family="DM Sans,sans-serif">Costos: '+fmtK(S.tip.d.costos)+'</text>'
      +'<text x="'+(tx+8)+'" y="'+(ty+60)+'" font-size="11" fill="#2A5C45" font-weight="600" font-family="DM Sans,sans-serif">Margen: '+Math.round((1-S.tip.d.costos/S.tip.d.ventas)*100)+'%</text>';
  }
  return '<svg viewBox="0 0 '+w+' '+h+'" class="chart-svg" style="height:'+h+'px" onmouseleave="S.tip=null;render()">'
    +'<defs>'
    +'<linearGradient id="gv" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stop-color="#2A5C45" stop-opacity="0.15"/><stop offset="95%" stop-color="#2A5C45" stop-opacity="0.02"/></linearGradient>'
    +'<linearGradient id="gc" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stop-color="#C4531A" stop-opacity="0.12"/><stop offset="95%" stop-color="#C4531A" stop-opacity="0.02"/></linearGradient>'
    +'</defs>'
    +yticks.map(function(t){return'<line x1="'+pad.l+'" y1="'+t.y+'" x2="'+(pad.l+cw)+'" y2="'+t.y+'" stroke="#E3DDD5" stroke-dasharray="3 3"/><text x="'+(pad.l-5)+'" y="'+t.y+'" text-anchor="end" dominant-baseline="central" fill="#9E9892" font-size="10" font-family="DM Mono,monospace">'+t.val+'</text>';}).join('')
    +data.map(function(d,i){return'<text x="'+xs[i].toFixed(1)+'" y="'+(pad.t+ch+16)+'" text-anchor="middle" fill="#9E9892" font-size="10" font-family="DM Sans,sans-serif">'+d.mes+'</text>';}).join('')
    +'<path d="'+fV+'" fill="url(#gv)"/><path d="'+fC+'" fill="url(#gc)"/>'
    +'<path d="'+pV+'" fill="none" stroke="#2A5C45" stroke-width="2" stroke-linejoin="round"/>'
    +'<path d="'+pC+'" fill="none" stroke="#C4531A" stroke-width="2" stroke-linejoin="round"/>'
    +xs.map(function(x,i){
      var d=data[i],ty2=Math.min(yv(d),yc(d));
      return'<rect x="'+(x-14).toFixed(1)+'" y="'+pad.t+'" width="28" height="'+ch+'" fill="transparent" onmouseenter="S.tip={x:'+x.toFixed(1)+',y:'+ty2.toFixed(1)+',d:'+JSON.stringify(d)+'};render()"/>';
    }).join('')
    +tipH+'</svg>';
}

function barChart(data,w,h){
  var pad={t:10,r:10,b:36,l:54};
  var cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
  var maxV=Math.max.apply(null,data.map(function(d){return d.ventas;}))*1.1;
  var bw=Math.floor(cw/data.length),gap=6,bwi=Math.floor((bw-gap*3)/2);
  var yticks=[0,.25,.5,.75,1].map(function(p){return{y:(pad.t+ch-p*ch).toFixed(1),val:fmtK(maxV*p)};});
  return '<svg viewBox="0 0 '+w+' '+h+'" class="chart-svg" style="height:'+h+'px">'
    +yticks.map(function(t){return'<line x1="'+pad.l+'" y1="'+t.y+'" x2="'+(pad.l+cw)+'" y2="'+t.y+'" stroke="#E3DDD5" stroke-dasharray="3 3"/><text x="'+(pad.l-5)+'" y="'+t.y+'" text-anchor="end" dominant-baseline="central" fill="#9E9892" font-size="10" font-family="DM Mono,monospace">'+t.val+'</text>';}).join('')
    +data.map(function(d,i){
      var x=pad.l+i*bw+gap,hv=Math.round((d.ventas/maxV)*ch),hg=Math.round((d.ganancia/maxV)*ch),yb=pad.t+ch;
      var lbl=d.seg.length>13?d.seg.substring(0,12)+'…':d.seg;
      return'<rect x="'+x+'" y="'+(yb-hv)+'" width="'+bwi+'" height="'+hv+'" fill="#E8F0EC" rx="3"/>'
        +'<rect x="'+(x+bwi+gap)+'" y="'+(yb-hg)+'" width="'+bwi+'" height="'+hg+'" fill="#2A5C45" rx="3"/>'
        +'<text x="'+(x+bwi)+'" y="'+(yb+14)+'" text-anchor="middle" fill="#9E9892" font-size="9" font-family="DM Sans,sans-serif">'+lbl+'</text>';
    }).join('')
    +'</svg>';
}

  var cw=W-pad.l-pad.r,ch=160-pad.t-pad.b;
  var maxV=Math.max.apply(null,data.map(function(d){return d.ventas;}))*1.1;

  // result = ventas - costos (aproximado)
  var dataR=data.map(function(d){return{mes:d.mes,result:Math.round(d.ventas*0.16)};});

function goStep(n){setState({step:n});}
function setMap(col,val){S.mapping[col]=val;S.mappingSaved=false;render();}
function saveMap(){setState({mappingSaved:true});}

function loadFileData(file,modId){
  var ext=file.name.split('.').pop().toLowerCase();
  if(ext==='csv'||ext==='txt'){
    var r=new FileReader();
    r.onload=function(e){
      var p=parseCSV(e.target.result);
      if(p){
        var auto={};p.headers.forEach(function(h){auto[h]=guessCategory(h);});
        S.files[modId]=Object.assign({},p,{name:file.name});
        if(!Object.keys(S.mapping).length) S.mapping=auto;
        render();
      }
    };
    r.readAsText(file,'UTF-8');
  } else if(ext==='xlsx'||ext==='xls'){
    var r2=new FileReader();
    r2.onload=function(e){
      var wb=XLSX.read(e.target.result,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var json=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(json.length>0){
        var headers=Object.keys(json[0]);
        var auto={};headers.forEach(function(h){auto[h]=guessCategory(h);});
        S.files[modId]={headers:headers,rows:json,name:file.name};
        if(!Object.keys(S.mapping).length) S.mapping=auto;
        render();
      }
    };
    r2.readAsArrayBuffer(file);
  }
}

function handleModFile(e,modId){
  if(e.target.files[0]) loadFileData(e.target.files[0],modId);
}

function loadDemo(){
  var p=parseCSV(DEMO_VENTAS);
  if(p){
    var auto={};p.headers.forEach(function(h){auto[h]=guessCategory(h);});
    S.files['ventas']=Object.assign({},p,{name:'demo_ventas.csv'});
    S.mapping=auto;
    S.pasteText=DEMO_VENTAS;
    render();
  }
}

function processPaste(){
  var text=S.pasteText||(document.getElementById('ta')?document.getElementById('ta').value:'');
  if(!text.trim())return;
  var p=parseCSV(text);
  if(p){
    var auto={};p.headers.forEach(function(h){auto[h]=guessCategory(h);});
    S.files['ventas']=Object.assign({},p,{name:'datos pegados'});
    S.mapping=auto;
    setState({step:2});
  } else {
    alert('No se detectó estructura. Incluí encabezados en la primera fila.');
  }
}

    +'DATOS DEL NEGOCIO (demo):\n'

    +'- Resultado operativo: '+fmtK(CASCADE.resultadoOp)+' ('+pct(CASCADE.resultadoOp,CASCADE.ventas)+'%)\n'
    +'- Costos directos: '+fmtK(CASCADE.costosDirectos)+' ('+pct(CASCADE.costosDirectos,CASCADE.ventas)+'%)\n'
    +'- Costos variables: '+fmtK(CASCADE.costosVariables)+' ('+pct(CASCADE.costosVariables,CASCADE.ventas)+'%)\n'
    +'- Costos fijos: '+fmtK(CASCADE.costosFijos)+' ('+pct(CASCADE.costosFijos,CASCADE.ventas)+'%)\n'
    +'- Cliente 1 ElectroMax SA: 30% ventas, 20% margen (celulares)\n'
    +'- Cliente 2 HogarPlus SRL: 15% ventas, 30% margen (línea blanca)\n'
    +'- Resto clientes (8): 55% ventas, 35% margen\n'
    +'- Mejor mes: Diciembre. Peor mes: Febrero.\n'
    +'- Archivos cargados: '+Object.keys(S.files).join(', ')+'\n';
}

async function sendChat(){
  var input=S.chatInput.trim();
  if(!input||S.chatLoading)return;
  S.chatMsgs.push({role:'user',text:input});
  S.chatInput='';
  S.chatLoading=true;
  render();

  var hasKey=S.apiKey&&S.apiKey.trim().length>10;
  if(!hasKey){
    // Respuestas demo sin API
    var demos={
      'mejor mes':'El mejor mes fue **Diciembre** con $1.52M en ventas (12.7% del total anual). Le sigue Noviembre con $1.35M. El último trimestre concentra el 34% de las ventas — hay estacionalidad importante.',
      'margen':'Tu margen global es del 27.6%, arrastrado a la baja por ElectroMax (20%). Sin ese cliente, tu margen promedio sería del 34%. Te recomiendo revisar las condiciones comerciales con ElectroMax.',
      'cliente':'ElectroMax SA es tu mayor cliente en facturación (30%) pero el de menor margen (20%). HogarPlus SRL tiene mejor relación: 15% de ventas con 30% de margen. Los 8 clientes restantes son los más rentables: 35% de margen promedio.',
      'equilibrio':'Con costos fijos de $1.56M y margen de contribución neto del 43%, tu punto de equilibrio mensual es aproximadamente $303K en ventas. Estás operando muy por encima — buena señal.',
    };
    var resp='Para activar respuestas reales con IA, ingresá tu clave API de Anthropic arriba. Mientras tanto, podés usar las sugerencias rápidas de arriba que tienen respuestas de ejemplo.';
    for(var k in demos){
      if(input.toLowerCase().indexOf(k)>=0){resp=demos[k];break;}
    }
    setTimeout(function(){
      S.chatMsgs.push({role:'ai',text:resp});
      S.chatLoading=false;
      render();
    },800);
    return;
  }

  // Real API call
  try{
    var messages=[];
    S.chatMsgs.slice(0,-1).forEach(function(m){
      if(m.role==='user'||m.role==='ai'){
        messages.push({role:m.role==='ai'?'assistant':'user',content:m.text});
      }
    });
    messages.push({role:'user',content:input});

    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:600,
        system:buildContext(),
        messages:messages
      })
    });
    var data=await res.json();
    var reply=data.content&&data.content[0]?data.content[0].text:'No pude procesar la respuesta.';
    S.chatMsgs.push({role:'ai',text:reply});
  } catch(err){
    S.chatMsgs.push({role:'ai',text:'Error al conectar con la API. Verificá tu clave y la conexión.'});
  }
  S.chatLoading=false;
  render();
}
