<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gestiónPyME — Control de Gestión</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F3EE;--surface:#FDFCFA;--border:#E2DDD6;--border2:#CBC4BB;
  --text:#1A1714;--text2:#6B6560;--text3:#9E9892;
  --accent:#2A5C45;--accent-light:#E8F0EC;
  --accent2:#C4531A;--accent2-light:#FAF0EA;
  --yellow:#E8C84A;--yellow-light:#FBF7E4;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:10px;--r-sm:6px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;}
/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;}
.vbadge{font-size:11px;font-family:var(--mono);background:var(--accent-light);color:var(--accent);padding:2px 7px;border-radius:4px;font-weight:500;}
.nav{display:flex;gap:2px;align-items:center;}
.ns{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3);padding:5px 10px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all .15s;}
.ns:hover{background:var(--bg);}
.ns.active{color:var(--accent);background:var(--accent-light);font-weight:500;}
.ns.done{color:var(--text2);}
.ns-n{width:18px;height:18px;border-radius:50%;border:1px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;}
.ns.done .ns-n{background:var(--accent);border-color:var(--accent);color:#fff;font-size:9px;}
.sep{color:var(--border2);font-size:11px;padding:0 2px;}
/* MAIN */
.main{max-width:960px;margin:0 auto;padding:28px 24px 48px;}
/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.card-hdr{padding:20px 24px 16px;border-bottom:1px solid var(--border);}
.slabel{font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--accent);text-transform:uppercase;margin-bottom:4px;}
.stitle{font-size:20px;font-weight:600;}
.ssub{font-size:13px;color:var(--text2);margin-top:3px;}
/* UPLOAD */
.dropzone{margin:24px;border:1.5px dashed var(--border2);border-radius:var(--r);padding:36px 24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg);}
.dropzone:hover,.dropzone.drag{border-color:var(--accent);background:var(--accent-light);}
.dropzone input{display:none;}
.dicon{font-size:28px;margin-bottom:10px;}
.dtitle{font-size:15px;font-weight:500;margin-bottom:5px;}
.dsub{font-size:13px;color:var(--text2);margin-bottom:16px;}
.ftags{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.ftag{font-size:11px;font-family:var(--mono);background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:3px 8px;border-radius:4px;}
.divrow{display:flex;align-items:center;gap:12px;margin:0 24px;}
.divline{flex:1;height:1px;background:var(--border);}
.divtxt{font-size:12px;color:var(--text3);}
.paste-wrap{margin:16px 24px 24px;}
.paste-lbl{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;}
textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;font-family:var(--mono);font-size:12px;color:var(--text);resize:vertical;min-height:80px;outline:none;transition:border .15s;line-height:1.6;}
textarea:focus{border-color:var(--accent);}
textarea::placeholder{color:var(--text3);}
/* TABLE */
.tscroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{background:var(--bg);padding:8px 12px;text-align:left;font-weight:600;color:var(--text2);font-size:11px;letter-spacing:.04em;border-bottom:1px solid var(--border);white-space:nowrap;}
thead th.r{text-align:right;}
tbody td{padding:7px 12px;border-bottom:1px solid var(--border);color:var(--text);}
tbody td.r{text-align:right;font-family:var(--mono);font-size:12px;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--accent-light);}
/* COL GRID */
.col-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;padding:20px 24px;}
.col-card{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);padding:12px;transition:all .15s;}
.col-card.mapped{border-color:var(--accent);background:var(--accent-light);}
.col-name{font-family:var(--mono);font-size:12px;font-weight:500;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.col-sample{font-size:11px;color:var(--text3);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
select{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-sm);padding:6px 8px;font-family:var(--font);font-size:12px;color:var(--text);cursor:pointer;outline:none;}
select:focus{border-color:var(--accent);}
.cbadge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 7px;border-radius:4px;font-weight:500;margin-top:5px;}
.cv{background:var(--accent-light);color:var(--accent);}
.cc{background:var(--accent2-light);color:var(--accent2);}
.cf{background:var(--yellow-light);color:#7A6318;}
.ccl{background:#EEF0FB;color:#3547B8;}
.cp{background:#F5EEFB;color:#7325B8;}
.cq{background:#EEF5FB;color:#1871B8;}
/* MAP SUMMARY */
.mapsumm{margin:0 24px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;}
.mapsumm h4{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.maptags{display:flex;gap:8px;flex-wrap:wrap;}
/* DASHBOARD */
.dbanner{background:var(--yellow-light);border:1px solid #d4b030;border-radius:var(--r-sm);padding:9px 16px;font-size:12px;color:#7A6318;margin-bottom:20px;}
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
.klbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.kval{font-size:22px;font-weight:600;font-family:var(--mono);}
.kdelta{font-size:12px;margin-top:4px;}
.up{color:var(--accent);}
.warn{color:#7A6318;}
.ptabs{display:flex;gap:4px;margin-bottom:20px;}
.ptab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s;}
.ptab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.cfull{grid-column:1/-1;}
.ccrd{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;}
.ctitle{font-size:14px;font-weight:600;margin-bottom:2px;}
.csub{font-size:12px;color:var(--text3);margin-bottom:14px;}
.legrow{display:flex;gap:16px;margin-bottom:10px;}
.legitem{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);}
.legdot{width:10px;height:10px;border-radius:2px;}
.rankn{font-size:11px;font-family:var(--mono);color:var(--text3);}
.barinl{height:5px;border-radius:3px;margin-top:3px;}
.mgb{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;font-family:var(--mono);}
.mgh{background:var(--accent-light);color:var(--accent);}
.mgm{background:var(--yellow-light);color:#7A6318;}
.mgl{background:var(--accent2-light);color:var(--accent2);}
.ibox{background:var(--yellow-light);border:1px solid #d4b030;border-radius:var(--r-sm);padding:12px 16px;margin-top:16px;font-size:13px;color:#5A4A10;line-height:1.6;}
.ibox strong{font-weight:600;}
/* SVG CHART */
.chart-svg{width:100%;overflow:visible;}
/* CTA */
.ctabar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:4px;}
.btn{padding:9px 18px;background:var(--accent);border:none;border-radius:var(--r-sm);font-family:var(--font);font-size:13px;font-weight:500;color:#fff;cursor:pointer;transition:all .15s;}
.btn:hover{background:#22493A;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn2{padding:8px 14px;background:transparent;border:1px solid var(--border2);border-radius:var(--r-sm);font-family:var(--font);font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s;}
.btn2:hover{border-color:var(--text2);color:var(--text);}
.btng{background:none;border:none;font-size:12px;color:var(--text3);cursor:pointer;text-decoration:underline;font-family:var(--font);}
.note{background:var(--accent-light);border:1px solid var(--accent);border-radius:var(--r-sm);padding:10px 16px;margin:16px 24px 0;font-size:13px;color:var(--accent);font-weight:500;}
@media(max-width:640px){
  .kgrid{grid-template-columns:1fr 1fr;}
  .cgrid{grid-template-columns:1fr;}
  .cfull{grid-column:1;}
  .main{padding:16px 12px 48px;}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const TOTAL = 12000000;
const CLIENTES = [
  {nombre:'ElectroMax SA',       pct:.30,margen:.20,categoria:'Celulares'},
  {nombre:'HogarPlus SRL',       pct:.15,margen:.30,categoria:'Línea blanca'},
  {nombre:'Distribuidora Norte', pct:.07,margen:.35,categoria:'Varios'},
  {nombre:'Almacén Central',     pct:.07,margen:.35,categoria:'Varios'},
  {nombre:'Kiosco del Centro',   pct:.06,margen:.35,categoria:'Varios'},
  {nombre:'Ferretería Roca',     pct:.06,margen:.35,categoria:'Varios'},
  {nombre:'Super La Esquina',    pct:.06,margen:.35,categoria:'Varios'},
  {nombre:'MiniMarket 24hs',     pct:.05,margen:.35,categoria:'Varios'},
  {nombre:'El Buen Precio',      pct:.05,margen:.35,categoria:'Varios'},
  {nombre:'Resto clientes',      pct:.09,margen:.35,categoria:'Varios'},
].map(c=>({...c,ventas:Math.round(TOTAL*c.pct),costo:Math.round(TOTAL*c.pct*(1-c.margen)),ganancia:Math.round(TOTAL*c.pct*c.margen)}));

const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const FACT=[.065,.060,.080,.075,.085,.080,.090,.088,.082,.095,.105,.095];
const DATA_M=MESES.map((mes,i)=>({mes,ventas:Math.round(TOTAL*FACT[i]),costos:Math.round(TOTAL*FACT[i]*.724)}));
const DATA_T=[
  {mes:'Q1',ventas:DATA_M.slice(0,3).reduce((s,d)=>s+d.ventas,0),costos:DATA_M.slice(0,3).reduce((s,d)=>s+d.costos,0)},
  {mes:'Q2',ventas:DATA_M.slice(3,6).reduce((s,d)=>s+d.ventas,0),costos:DATA_M.slice(3,6).reduce((s,d)=>s+d.costos,0)},
  {mes:'Q3',ventas:DATA_M.slice(6,9).reduce((s,d)=>s+d.ventas,0),costos:DATA_M.slice(6,9).reduce((s,d)=>s+d.costos,0)},
  {mes:'Q4',ventas:DATA_M.slice(9,12).reduce((s,d)=>s+d.ventas,0),costos:DATA_M.slice(9,12).reduce((s,d)=>s+d.costos,0)},
];

const CATS=[
  {v:'',      l:'— Sin categoría —'},
  {v:'fecha', l:'📅 Fecha',    b:'cf'},
  {v:'ventas',l:'💰 Ventas',   b:'cv'},
  {v:'costos',l:'📦 Costos',   b:'cc'},
  {v:'cliente',l:'👤 Cliente', b:'ccl'},
  {v:'producto',l:'🏷️ Producto',b:'cp'},
  {v:'cantidad',l:'🔢 Cantidad',b:'cq'},
];

const DEMO=`Mes\tCliente\tCategoria\tVentas\tCostos\nEne\tElectroMax SA\tCelulares\t300000\t240000\nFeb\tHogarPlus SRL\tLinea blanca\t150000\t105000\nMar\tDistribuidora Norte\tVarios\t84000\t54600\nAbr\tAlmacen Central\tVarios\t84000\t54600\nMay\tKiosco del Centro\tVarios\t72000\t46800\nJun\tFerreteria Roca\tVarios\t72000\t46800\nJul\tSuper La Esquina\tVarios\t72000\t46800\nAgo\tMiniMarket 24hs\tVarios\t60000\t39000\nSep\tEl Buen Precio\tVarios\t60000\t39000\nOct\tResto clientes\tVarios\t108000\t70200`;

// ── UTILS ────────────────────────────────────────────────────────────────────
const fmtK=n=>n>=1000000?`$${(n/1e6).toFixed(1)}M`:`$${(n/1000).toFixed(0)}K`;

function guessCategory(col){
  const n=col.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if(/fecha|date|mes|periodo/.test(n))return'fecha';
  if(/venta|ingreso|precio|importe|total|factura/.test(n))return'ventas';
  if(/costo|gasto|cmp/.test(n))return'costos';
  if(/cliente|razon|empresa|nombre/.test(n))return'cliente';
  if(/producto|articulo|item|categoria/.test(n))return'producto';
  if(/cantidad|qty|unidad/.test(n))return'cantidad';
  return'';
}

function parseCSV(text){
  const lines=text.trim().split('\n').filter(l=>l.trim());
  if(lines.length<2)return null;
  const sep=lines[0].includes('\t')?'\t':lines[0].includes(';')?';':',';
  const headers=lines[0].split(sep).map(h=>h.trim().replace(/^["']|["']$/g,''));
  const rows=lines.slice(1).map(l=>{
    const vals=l.split(sep).map(v=>v.trim().replace(/^["']|["']$/g,''));
    const row={};headers.forEach((h,i)=>row[h]=vals[i]||'');return row;
  });
  return{headers,rows};
}

// ── SVG AREA CHART ───────────────────────────────────────────────────────────
function AreaChart({data,w,h}){
  const pad={t:10,r:10,b:28,l:52};
  const cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;
  const maxV=Math.max(...data.map(d=>d.ventas))*1.1;
  const xs=data.map((_,i)=>pad.l+i/(data.length-1)*cw);
  const yv=d=>pad.t+ch-(d.ventas/maxV)*ch;
  const yc=d=>pad.t+ch-(d.costos/maxV)*ch;

  const pathV=`M${xs.map((x,i)=>`${x},${yv(data[i])}`).join('L')}`;
  const pathC=`M${xs.map((x,i)=>`${x},${yc(data[i])}`).join('L')}`;
  const fillV=`${pathV}L${xs[xs.length-1]},${pad.t+ch}L${xs[0]},${pad.t+ch}Z`;
  const fillC=`${pathC}L${xs[xs.length-1]},${pad.t+ch}L${xs[0]},${pad.t+ch}Z`;

  // y axis ticks
  const yticks=[0,.25,.5,.75,1].map(p=>({y:pad.t+ch-p*ch,val:fmtK(maxV*p)}));
  // tooltip state
  const [tip,setTip]=window._useState(null);

  return `<svg viewBox="0 0 ${w} ${h}" class="chart-svg" style="height:${h}px"
    onmouseleave="window._setTip(null)">
    <defs>
      <linearGradient id="gv" x1="0" y1="0" x2="0" y2="1">
        <stop offset="5%" stop-color="#2A5C45" stop-opacity="0.15"/>
        <stop offset="95%" stop-color="#2A5C45" stop-opacity="0.02"/>
      </linearGradient>
      <linearGradient id="gc" x1="0" y1="0" x2="0" y2="1">
        <stop offset="5%" stop-color="#C4531A" stop-opacity="0.12"/>
        <stop offset="95%" stop-color="#C4531A" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    ${yticks.map(t=>`
      <line x1="${pad.l}" y1="${t.y}" x2="${pad.l+cw}" y2="${t.y}" stroke="#E2DDD6" stroke-dasharray="3 3"/>
      <text x="${pad.l-6}" y="${t.y}" text-anchor="end" dominant-baseline="central" fill="#9E9892" font-size="10" font-family="DM Mono,monospace">${t.val}</text>
    `).join('')}
    ${data.map((d,i)=>`<text x="${xs[i]}" y="${pad.t+ch+16}" text-anchor="middle" fill="#9E9892" font-size="10" font-family="DM Sans,sans-serif">${d.mes}</text>`).join('')}
    <path d="${fillV}" fill="url(#gv)"/>
    <path d="${fillC}" fill="url(#gc)"/>
    <path d="${pathV}" fill="none" stroke="#2A5C45" stroke-width="2" stroke-linejoin="round"/>
    <path d="${pathC}" fill="none" stroke="#C4531A" stroke-width="2" stroke-linejoin="round"/>
    ${xs.map((x,i)=>`<rect x="${x-14}" y="${pad.t}" width="28" height="${ch}" fill="transparent"
      onmouseenter="window._setTip({x:${x},y:${Math.min(yv(data[i]),yc(data[i]))-10},d:${JSON.stringify(data[i])}})"
    />`).join('')}
    ${tip?`<line x1="${tip.x}" y1="${pad.t}" x2="${tip.x}" y2="${pad.t+ch}" stroke="#CBC4BB" stroke-width="1"/>
      <rect x="${Math.min(tip.x+6,w-130)}" y="${Math.max(tip.y-10,pad.t)}" width="120" height="70" rx="6" fill="#FDFCFA" stroke="#E2DDD6"/>
      <text x="${Math.min(tip.x+14,w-122)}" y="${Math.max(tip.y+6,pad.t+8)}" font-size="11" font-weight="600" fill="#1A1714" font-family="DM Sans,sans-serif">${tip.d.mes}</text>
      <text x="${Math.min(tip.x+14,w-122)}" y="${Math.max(tip.y+22,pad.t+24)}" font-size="11" fill="#2A5C45" font-family="DM Sans,sans-serif">Ventas: ${fmtK(tip.d.ventas)}</text>
      <text x="${Math.min(tip.x+14,w-122)}" y="${Math.max(tip.y+37,pad.t+39)}" font-size="11" fill="#C4531A" font-family="DM Sans,sans-serif">Costos: ${fmtK(tip.d.costos)}</text>
      <text x="${Math.min(tip.x+14,w-122)}" y="${Math.max(tip.y+52,pad.t+54)}" font-size="11" fill="#2A5C45" font-weight="600" font-family="DM Sans,sans-serif">Margen: ${Math.round((1-tip.d.costos/tip.d.ventas)*100)}%</text>
    `:''}
  </svg>`;
}

// ── BAR CHART ─────────────────────────────────────────────────────────────────
function BarChart({data,w,h}){
  const pad={t:10,r:10,b:28,l:52};
  const cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;
  const maxV=Math.max(...data.map(d=>d.ventas))*1.1;
  const bw=Math.floor(cw/data.length);
  const gap=6;
  const bwi=Math.floor((bw-gap*3)/2);

  const yticks=[0,.25,.5,.75,1].map(p=>({y:pad.t+ch-p*ch,val:fmtK(maxV*p)}));

  return `<svg viewBox="0 0 ${w} ${h}" class="chart-svg" style="height:${h}px">
    ${yticks.map(t=>`
      <line x1="${pad.l}" y1="${t.y}" x2="${pad.l+cw}" y2="${t.y}" stroke="#E2DDD6" stroke-dasharray="3 3"/>
      <text x="${pad.l-6}" y="${t.y}" text-anchor="end" dominant-baseline="central" fill="#9E9892" font-size="10" font-family="DM Mono,monospace">${t.val}</text>
    `).join('')}
    ${data.map((d,i)=>{
      const x=pad.l+i*bw+gap;
      const hv=Math.round((d.ventas/maxV)*ch);
      const hg=Math.round((d.ganancia/maxV)*ch);
      const ybase=pad.t+ch;
      const lbl=d.seg.length>14?d.seg.substring(0,13)+'…':d.seg;
      return `
        <rect x="${x}" y="${ybase-hv}" width="${bwi}" height="${hv}" fill="#E8F0EC" rx="3"/>
        <rect x="${x+bwi+gap}" y="${ybase-hg}" width="${bwi}" height="${hg}" fill="#2A5C45" rx="3"/>
        <text x="${x+bwi}" y="${ybase+16}" text-anchor="middle" fill="#9E9892" font-size="9" font-family="DM Sans,sans-serif">${lbl}</text>
      `;
    }).join('')}
  </svg>`;
}

// ── STATE MACHINE ─────────────────────────────────────────────────────────────
let _state={
  step:1, csvData:null, fileName:'', mapping:{}, periodo:'mensual', pasteText:'', drag:false, tip:null
};
window._useState=k=>_state[k];
window._setTip=v=>{_state.tip=v;render();};

function setState(patch){_state={..._state,...patch};render();}

// ── RENDER HELPERS ────────────────────────────────────────────────────────────
function renderHeader(){
  const steps=['Importar','Categorizar','Dashboard','Chat IA'];
  const s=_state.step;
  return `<div class="header">
    <div class="logo"><div class="logo-dot"></div>gestiónPyME<span class="vbadge">v1.0</span></div>
    <div class="nav">
      ${steps.map((st,i)=>{
        const cls=s===i+1?'active':s>i+1?'done':'';
        return `${i>0?'<span class="sep">›</span>':''}
        <div class="ns ${cls}" onclick="if(${s}>=${i+2})setState({step:${i+1}})">
          <div class="ns-n">${s>i+1?'✓':i+1}</div><span>${st}</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderStep1(){

      </div>
    </div>

    <div style="padding:16px 24px">

        <span style="font-size:13px;font-weight:600">Vista previa</span>

          <thead><tr>${csvData.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
          <tbody>${csvData.rows.slice(0,4).map(r=>`<tr>${csvData.headers.map(h=>`<td>${r[h]??''}</td>`).join('')}</tr>`).join('')}</tbody>
        </table>
        ${csvData.rows.length>4?`<div style="text-align:center;padding:6px;font-size:11px;color:var(--text3);background:var(--bg);border-top:1px solid var(--border)">+${csvData.rows.length-4} filas más</div>`:''}

    </div>
    <div style="padding:0 24px;border-top:1px solid var(--border);padding-top:16px">

      <div style="font-size:13px;color:var(--text2);margin-bottom:4px">¿Qué representa cada columna? Detectamos ${mapped} de ${csvData.headers.length} automáticamente.</div>

        const val=mapping[col]||'';

          <div class="col-sample">ej: ${sample||'—'}</div>

            ${CATS.map(c=>`<option value="${c.v}"${val===c.v?' selected':''}>${c.l}</option>`).join('')}
          </select>

    <div class="mapsumm">

      <div class="maptags">

        <button class="btn" ${mapped<2?'disabled':''} onclick="setState({step:3})">Ver Dashboard →</button>

function renderStep3(){

    </div>
    <div class="ptabs">
      <button class="ptab${_state.periodo==='mensual'?' active':''}" onclick="setState({periodo:'mensual'})">Mensual</button>
      <button class="ptab${_state.periodo==='trimestral'?' active':''}" onclick="setState({periodo:'trimestral'})">Trimestral</button>
    </div>
    <div class="cgrid">
      <div class="ccrd cfull">
        <div class="ctitle">Ventas vs Costos</div>
        <div class="csub">El área entre las curvas es tu margen bruto</div>
        <div class="legrow">
          <div class="legitem"><div class="legdot" style="background:#2A5C45"></div>Ventas</div>
          <div class="legitem"><div class="legdot" style="background:#C4531A"></div>Costos</div>
        </div>

      </div>
      <div class="ccrd">
        <div class="ctitle">Top clientes por facturación</div>

        <div class="tscroll">

            <thead><tr><th>#</th><th>Cliente</th><th class="r">Ventas</th><th class="r">Margen</th></tr></thead>
            <tbody>
              ${CLIENTES.map((c,i)=>`<tr>
                <td><span class="rankn">#${i+1}</span></td>
                <td>
                  <div style="font-weight:${i<2?500:400};font-size:12px">${c.nombre}</div>
                  <div class="barinl" style="width:${Math.round(c.ventas/maxV*100)}%;background:${i===0?'#C4531A':i===1?'#E8C84A':'#2A5C45'}"></div>
                </td>
                <td class="r">${fmtK(c.ventas)}</td>

          <div class="legitem"><div class="legdot" style="background:#2A5C45"></div>Ganancia</div>
        </div>
        ${BarChart({data:segData,w:Math.round(W/2)-40,h:180})}
        <div class="ibox">
          💡 <strong>Insight clave:</strong> ElectroMax es el 30% de tus ventas pero solo el <strong>${Math.round(seg1G/totG*100)}% de tu ganancia</strong>. Los clientes chicos generan el <strong>${Math.round(seg3G/totG*100)}% del margen total</strong>.

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render(){
  document.getElementById('app').innerHTML=`
    ${renderHeader()}
    <div class="main">
      ${_state.step===1?renderStep1():''}
      ${_state.step===2&&_state.csvData?renderStep2():''}
      ${_state.step===3?renderStep3():''}
    </div>`;
}

// ── EVENT HANDLERS ────────────────────────────────────────────────────────────
window.setState=setState;

window.setMapping=function(col,val){
  setState({mapping:{..._state.mapping,[col]:val}});
};

window.processPaste=function(){
  const p=parseCSV(_state.pasteText);
  if(p){
    const auto={};p.headers.forEach(h=>{auto[h]=guessCategory(h);});
    setState({csvData:p,fileName:'datos pegados',mapping:auto,step:2});
  } else {
    alert('No se detectó estructura. Incluí encabezados en la primera fila.');
  }
};

window.handleFile=function(e){
  const file=e.target.files[0];if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==='csv'||ext==='txt'){
    const r=new FileReader();
    r.onload=ev=>{
      const p=parseCSV(ev.target.result);
      if(p){const auto={};p.headers.forEach(h=>{auto[h]=guessCategory(h);});setState({csvData:p,fileName:file.name,mapping:auto,step:2});}
    };
    r.readAsText(file,'UTF-8');
  } else if(ext==='xlsx'||ext==='xls'){
    const r=new FileReader();
    r.onload=ev=>{
      const wb=XLSX.read(ev.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(json.length>0){
        const auto={};Object.keys(json[0]).forEach(h=>{auto[h]=guessCategory(h);});
        setState({csvData:{headers:Object.keys(json[0]),rows:json},fileName:file.name,mapping:auto,step:2});
      }
    };
    r.readAsArrayBuffer(file);
  }
};

window.handleDrop=function(e){
  e.preventDefault();setState({drag:false});
  const file=e.dataTransfer.files[0];
  if(file) window.handleFile({target:{files:[file]}});
};

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
