<script>
// ══════════════════════════════════════════════════════
// KPI ENGINE
// ══════════════════════════════════════════════════════
function getRowsForKPI(kpi){var a=kpi.archivo||'ventas',f=S.files[a];if(!f||!f.rows)return[];if(a==='ventas')return filterRows(f.rows,f.headers);return f.rows;}
function calcKPI(kpi){
  var rows=getRowsForKPI(kpi);if(!rows.length)return{val:0,isPct:false};
  var A=kpi.campoA,B=kpi.campoB,sA=rows.reduce(function(s,r){return s+num(r[A]||0);},0),sB=B?rows.reduce(function(s,r){return s+num(r[B]||0);},0):0;
  var isPct=false,val=0;
  switch(kpi.formula){
    case'SUM':val=sA;break;case'AVG':val=rows.length?sA/rows.length:0;break;
    case'MAX':val=Math.max.apply(null,rows.map(function(r){return num(r[A]||0);}));break;
    case'MIN':val=Math.min.apply(null,rows.map(function(r){return num(r[A]||0);}));break;
    case'COUNT':val=rows.length;break;case'RATIO':val=sB?sA/sB:0;break;
    case'RATIO_PCT':val=sA?Math.round((1-sB/sA)*100):0;isPct=true;break;
    case'VAR_PCT':val=sB?Math.round((sA-sB)/sB*100):0;isPct=true;break;
    case'LIBRE':try{var fn=new Function('A','B','rows','num','sumA','sumB','return '+(kpi.libre||'sumA')+';');val=fn(sA,sB,rows,num,sA,sB);isPct=String(kpi.libre||'').indexOf('100')>=0;}catch(e){val=0;}break;
    default:val=sA;
  }
  return{val:val,isPct:isPct};
}
function calcKPIByPeriod(kpi){
  var a=kpi.archivo||'ventas',f=S.files[a];if(!f||!f.rows)return[];
  var mp=S.mappings[a]||{},fCol=f.headers.find(function(h){return mp[h]==='fecha';})||f.headers[0];
  var A=kpi.campoA,B=kpi.campoB,byP={};
  f.rows.forEach(function(r){var mes=r[fCol]||'—';if(!byP[mes])byP[mes]={mes:mes,sA:0,sB:0,count:0};byP[mes].sA+=num(r[A]||0);byP[mes].sB+=B?num(r[B]||0):0;byP[mes].count++;});
  return Object.values(byP).map(function(p){var val=0;switch(kpi.formula){case'SUM':val=p.sA;break;case'AVG':val=p.count?p.sA/p.count:0;break;case'COUNT':val=p.count;break;case'RATIO_PCT':val=p.sA?Math.round((1-p.sB/p.sA)*100):0;break;default:val=p.sA;}return{mes:p.mes,val:val};});
}
function microSpark(pd,w,h){
  if(!pd||pd.length<2)return'<div style="height:'+h+'px"></div>';
  var vals=pd.map(function(p){return p.val;}),maxV=Math.max.apply(null,vals)||1,minV=Math.min(0,Math.min.apply(null,vals)),range=maxV-minV||1;
  var xs=vals.map(function(_,i){return Math.round(i/(vals.length-1)*w);});
  var ys=vals.map(function(v){return Math.round(h-(v-minV)/range*(h-2));});
  var path='M'+xs.map(function(x,i){return x+','+ys[i];}).join('L');
  var col=vals[vals.length-1]>=vals[vals.length-2]?'#1C3F2C':'#B84020';
  return'<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:'+h+'px"><path d="'+path+'" fill="none" stroke="'+col+'" stroke-width="1.5"/><circle cx="'+xs[xs.length-1]+'" cy="'+ys[ys.length-1]+'" r="2.5" fill="'+col+'"/></svg>';
}

// ══════════════════════════════════════════════════════
// PAGE: KPIs
// ══════════════════════════════════════════════════════
function renderKPIs(){
  var el=document.getElementById('page-kpis');if(!el)return;
  var vf=S.files['ventas'];
  if(!vf){el.innerHTML='<div class="page-wrap"><div class="empty"><div class="empty-icon">📈</div><div class="empty-title">Sin datos</div><div class="empty-sub">Cargá al menos Ventas para ver KPIs.</div><button class="btn" onclick="nav(\'archivos\')">Ir a Archivos</button></div></div>';return;}
  var mp=S.mappings['ventas']||{};
  var fC=vf.headers.find(function(h){return mp[h]==='fecha';}),clC=vf.headers.find(function(h){return mp[h]==='cliente';}),prC=vf.headers.find(function(h){return mp[h]==='producto';});
  var meses=[...new Set(fC?vf.rows.map(function(r){return r[fC];}).filter(Boolean):[])];
  var clientes=[...new Set(clC?vf.rows.map(function(r){return r[clC];}).filter(Boolean):[])];
  var productos=[...new Set(prC?vf.rows.map(function(r){return r[prC];}).filter(Boolean):[])];
  var allF={};Object.keys(S.files).forEach(function(k){S.files[k].headers.forEach(function(h){allF[h]=k;});});
  var allFN=Object.keys(allF);
  var html='<div class="page-wrap"><div class="page-header"><div class="page-title">KPIs Operativos</div><div class="page-sub">Indicadores clave calculados en tiempo real sobre tus datos.</div></div>';
  // Filters
  html+='<div class="kpi-filters"><div class="kf-g"><div class="kf-lbl">Períodos</div><div class="kf-months">'
    +(meses.length?meses.map(function(m){var sel=S.kpiFilters.meses.indexOf(m)>=0;return'<div class="kf-month'+(sel?' sel':'')+'" onclick="toggleMes(\''+m+'\')">'+m+'</div>';}).join(''):'<span style="font-size:10px;color:var(--t3)">Sin períodos</span>')+'</div>'
    +(S.kpiFilters.meses.length?'<button class="btng" style="margin-top:3px" onclick="S.kpiFilters.meses=[];renderKPIs()">Limpiar</button>':'')
    +'</div>'
    +'<div class="kf-g"><div class="kf-lbl">Cliente</div><select class="kf-sel" onchange="S.kpiFilters.cliente=this.value;renderKPIs()"><option value="">Todos</option>'+clientes.map(function(c){return'<option value="'+c+'"'+(S.kpiFilters.cliente===c?' selected':'')+'>'+c+'</option>';}).join('')+'</select></div>'
    +'<div class="kf-g"><div class="kf-lbl">Producto</div><select class="kf-sel" onchange="S.kpiFilters.producto=this.value;renderKPIs()"><option value="">Todos</option>'+productos.map(function(p){return'<option value="'+p+'"'+(S.kpiFilters.producto===p?' selected':'')+'>'+p+'</option>';}).join('')+'</select></div>'
    +(S.kpiFilters.meses.length||S.kpiFilters.cliente||S.kpiFilters.producto?'<div class="kf-g" style="justify-content:flex-end;padding-top:17px"><button class="btn out sm" onclick="S.kpiFilters={meses:[],cliente:\'\',producto:\'\'};renderKPIs()">↺ Limpiar</button></div>':'')
    +'</div>';
  // Toggle
  html+='<div class="dash-toggle" style="margin-bottom:16px"><button class="dtab'+(S.kpiView==='ventas'?' active':'')+'" onclick="S.kpiView=\'ventas\';renderKPIs()">KPIs Ventas</button><button class="dtab'+(S.kpiView==='costos'?' active':'')+'" onclick="S.kpiView=\'costos\';renderKPIs()">KPIs Costos</button></div>';
  var presets=S.kpiView==='ventas'?KPI_V:KPI_C;
  var custom=S.customKPIs.filter(function(k){return k.tipo===S.kpiView;});
  html+='<div class="kpi-cards">';
  presets.concat(custom).forEach(function(kpi){
    var res=calcKPI(kpi),pd=calcKPIByPeriod(kpi),isC=kpi.id.indexOf('custom_')>=0;
    var metaOk=kpi.meta&&res.val>=num(kpi.meta);
    html+='<div class="kpi-card'+(isC?' custom':'')+'">'
      +(isC?'<button class="kpi-del" onclick="deleteKPI(\''+kpi.id+'\')" title="Eliminar">✕</button>':'')
      +'<div class="kpi-card-lbl">'+kpi.nombre+'</div>'
      +'<div class="kpi-card-val">'+(res.val?fmtV(res.val,res.isPct):'—')+'</div>'
      +'<div class="kpi-card-form">'+kpi.formula+(kpi.campoA?' · '+kpi.campoA:'')+(kpi.campoB?' ÷ '+kpi.campoB:'')+'</div>'
      +(kpi.meta?'<div class="kpi-card-meta" style="color:'+(metaOk?'var(--accent)':'var(--red)')+'">Meta: '+fmtV(num(kpi.meta),res.isPct)+' '+(metaOk?'✓':'↓')+'</div>':'')
      +'<div class="kpi-card-trend">'+microSpark(pd,100,32)+'</div></div>';
  });
  html+='</div>';
  var nk=S.newKPI;
  var flbls={SUM:'Suma',AVG:'Promedio',MAX:'Máximo',MIN:'Mínimo',COUNT:'Conteo',RATIO:'Ratio A÷B',RATIO_PCT:'Margen % (A−B)÷A',VAR_PCT:'Variación % (A−B)÷B',LIBRE:'Fórmula libre'};
  var needsB=['RATIO','RATIO_PCT','VAR_PCT','LIBRE'].indexOf(nk.formula)>=0,needsL=nk.formula==='LIBRE';
  html+='<div class="kpi-builder"><div style="font-size:12px;font-weight:600;margin-bottom:12px">➕ Crear KPI propio</div><div class="kbg">'
    +'<div><div class="kb-lbl">Nombre</div><input class="kb-in" type="text" placeholder="Ej: Margen cliente top" value="'+nk.nombre+'" oninput="S.newKPI.nombre=this.value"></div>'
    +'<div><div class="kb-lbl">Fórmula</div><select class="kb-in" onchange="S.newKPI.formula=this.value;renderKPIs()">'+Object.keys(flbls).map(function(f){return'<option value="'+f+'"'+(nk.formula===f?' selected':'')+'>'+flbls[f]+'</option>';}).join('')+'</select></div>'
    +'<div><div class="kb-lbl">Campo A</div><select class="kb-in" onchange="S.newKPI.campoA=this.value"><option value="">— elegir —</option>'+allFN.map(function(f){return'<option value="'+f+'"'+(nk.campoA===f?' selected':'')+'>'+f+' ['+allF[f]+']</option>';}).join('')+'</select></div>'
    +(needsB?'<div><div class="kb-lbl">Campo B</div><select class="kb-in" onchange="S.newKPI.campoB=this.value"><option value="">— elegir —</option>'+allFN.map(function(f){return'<option value="'+f+'"'+(nk.campoB===f?' selected':'')+'>'+f+' ['+allF[f]+']</option>';}).join('')+'</select></div>':'<div></div>')
    +(needsL?'<div style="grid-column:1/-1"><div class="kb-lbl">Fórmula libre (variables: sumA, sumB)</div><input class="kb-in" type="text" placeholder="(sumA-sumB)/sumA*100" value="'+nk.libre+'" oninput="S.newKPI.libre=this.value"></div>':'')
    +'<div><div class="kb-lbl">Meta</div><input class="kb-in" type="number" placeholder="Ej: 30" value="'+nk.meta+'" oninput="S.newKPI.meta=this.value"></div>'
    +'<div style="display:flex;align-items:flex-end"><button class="btn" onclick="addKPI()" style="width:100%">+ Agregar</button></div>'
    +'</div></div></div>';
  el.innerHTML=html;
}

function toggleMes(m){var idx=S.kpiFilters.meses.indexOf(m);if(idx>=0)S.kpiFilters.meses.splice(idx,1);else S.kpiFilters.meses.push(m);renderKPIs();}
function addKPI(){var nk=S.newKPI;if(!nk.nombre||!nk.campoA){alert('Completá nombre y Campo A.');return;}S.customKPIs.push({id:'custom_'+Date.now(),nombre:nk.nombre,formula:nk.formula,campoA:nk.campoA,campoB:nk.campoB,meta:nk.meta,tipo:S.kpiView,libre:nk.libre});S.newKPI={nombre:'',formula:'SUM',campoA:'',campoB:'',meta:'',tipo:S.kpiView,libre:''};persist();renderKPIs();}
function deleteKPI(id){if(!confirm('¿Eliminar este KPI?'))return;S.customKPIs=S.customKPIs.filter(function(k){return k.id!==id;});persist();renderKPIs();}

// ══════════════════════════════════════════════════════
// PAGE: CHAT
// ══════════════════════════════════════════════════════
function renderChat(){
  var el=document.getElementById('page-chat');if(!el)return;
  var hasKey=S.apiKey&&S.apiKey.length>10;
  el.innerHTML='<div class="page-wrap"><div class="page-header"><div class="page-title">Chat IA</div><div class="page-sub">Preguntá en lenguaje natural sobre tus datos.</div></div>'
    +'<div class="chat-wrap">'
    +(hasKey?''
      :'<div class="api-row"><label>🔑 Clave API:</label><input class="api-in" type="password" placeholder="sk-ant-..." value="'+S.apiKey+'" oninput="S.apiKey=this.value"><button class="btn sm" onclick="saveKey()">Guardar</button><a href="https://console.anthropic.com" target="_blank" style="font-size:10px;color:var(--gold);white-space:nowrap">Obtener →</a></div>')
    +'<div class="chat-sugs">'
    +['¿Mejor mes en ventas?','¿Producto con más margen?','¿Punto de equilibrio?','¿Proveedor más caro?','¿Concentración de clientes?']
    .map(function(s){return'<button class="sug" onclick="sendSug(\''+s+'\')">'+s+'</button>';}).join('')+'</div>'
    +'<div class="chat-msgs" id="chat-msgs">'+S.chatMsgs.map(function(m){return'<div class="msg '+m.role+'">'+m.text.replace(/\n/g,'<br>')+'</div>';}).join('')+'</div>'
    +'<div class="chat-input-row"><input class="chat-in" id="chat-in" type="text" placeholder="Preguntá sobre tus datos..." value="'+S.chatInput+'" oninput="S.chatInput=this.value" onkeydown="if(event.key===\'Enter\'){sendChat();}"><button class="btn" style="border-radius:20px" onclick="sendChat()"'+(S.chatLoading?' disabled':'')+'>'+( S.chatLoading?'…':'→')+'</button></div></div></div>';
  var cm=document.getElementById('chat-msgs');if(cm)cm.scrollTop=cm.scrollHeight;
}

// ══════════════════════════════════════════════════════
// PAGE: CONFIG
// ══════════════════════════════════════════════════════
function renderConfig(){
  var el=document.getElementById('page-config');if(!el)return;
  var fc=fileCount(),rows=Object.values(S.files).reduce(function(s,f){return s+(f.rows?f.rows.length:0);},0),dC=Object.keys(S.files).filter(function(k){return S.files[k].isDemo;}).length;
  el.innerHTML='<div class="page-wrap"><div class="page-header"><div class="page-title">Configuración</div></div>'
    +'<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:14px;box-shadow:var(--sh)">'
    +'<div style="padding:14px 18px;border-bottom:1px solid var(--border)"><div style="font-size:12px;font-weight:600">Clave API Anthropic</div><div style="font-size:10px;color:var(--t3);margin-top:2px">Para activar el Chat IA con respuestas reales</div></div>'
    +'<div style="padding:14px 18px"><div style="display:flex;gap:8px;margin-bottom:7px"><input id="cfg-key" type="password" style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:6px 9px;font-family:var(--mono);font-size:11px;color:var(--text);outline:none;" placeholder="sk-ant-..." value="'+(S.apiKey||'')+'"><button class="btn" onclick="saveKey()">Guardar</button></div>'
    +'<div style="font-size:10px;color:var(--t3)">La clave se guarda solo en tu navegador. <a href="https://console.anthropic.com" target="_blank" style="color:var(--accent)">Obtener clave →</a></div></div></div>'
    +'<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh)">'
    +'<div style="padding:14px 18px;border-bottom:1px solid var(--border)"><div style="font-size:12px;font-weight:600">Datos cargados</div><div style="font-size:10px;color:var(--t3);margin-top:2px">'+fc+' archivo(s) · '+rows+' filas · '+dC+' demo · '+(fc-dC)+' real(es)</div></div>'
    +'<div style="padding:14px 18px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn danger" onclick="if(confirm(\'¿Borrar todo?\'))clearAll()">Borrar todo</button><button class="btn out" onclick="if(confirm(\'¿Borrar solo ejemplos?\'))removeAllDemo()">Borrar solo ejemplos</button></div></div></div>';
}

// ══════════════════════════════════════════════════════
// HANDLERS
// ══════════════════════════════════════════════════════
function setMapTab(id){S.mapTab=id;renderMapeo();}
function setMap(mid,col,val){if(!S.mappings[mid])S.mappings[mid]={};S.mappings[mid][col]=val;persist();renderMapeo();}
function setDV(v){S.dashView=v;renderDashboard();}
function rmFile(id){if(!confirm('¿Eliminar '+id+'?'))return;delete S.files[id];delete S.mappings[id];persist();nav(S.page);}
function removeAllDemo(){Object.keys(S.files).forEach(function(k){if(S.files[k].isDemo){delete S.files[k];delete S.mappings[k];}});persist();nav(S.page);}
function clearAll(){S.files={};S.mappings={};S.customKPIs=[];S.chatMsgs=[{role:'ai',text:'Datos borrados. Cargá tus archivos para comenzar.'}];persist();nav('archivos');}
function handleFile(e,modId){var file=e.target.files[0];if(!file)return;var ext=file.name.split('.').pop().toLowerCase();
  if(ext==='csv'||ext==='txt'){var r=new FileReader();r.onload=function(ev){var p=parseCSV(ev.target.result);if(p){var auto={};p.headers.forEach(function(h){auto[h]=guessCategory(h);});S.files[modId]=Object.assign({},p,{name:file.name,isDemo:false});S.mappings[modId]=auto;persist();nav(S.page);}};r.readAsText(file,'UTF-8');}
  else if(ext==='xlsx'||ext==='xls'){var r2=new FileReader();r2.onload=function(ev){var wb=XLSX.read(ev.target.result,{type:'array'});var ws=wb.Sheets[wb.SheetNames[0]];var json=XLSX.utils.sheet_to_json(ws,{defval:''});if(json.length>0){var h=Object.keys(json[0]);var auto={};h.forEach(function(hh){auto[hh]=guessCategory(hh);});S.files[modId]={headers:h,rows:json,name:file.name,isDemo:false};S.mappings[modId]=auto;persist();nav(S.page);}};r2.readAsArrayBuffer(file);}
}
function processPaste(){var ta=document.getElementById('ta');var text=ta?ta.value.trim():'';if(!text)return;var p=parseCSV(text);if(p){var auto={};p.headers.forEach(function(h){auto[h]=guessCategory(h);});S.files['ventas']={headers:p.headers,rows:p.rows,name:'datos pegados',isDemo:false};S.mappings['ventas']=auto;persist();nav('mapeo');}else alert('No se detectó estructura. Incluí encabezados en la primera fila.');}
function saveKey(){var inp=document.getElementById('cfg-key')||document.querySelector('.api-in');if(inp){S.apiKey=inp.value.trim();persist();renderConfig();renderChat();}}
function sendSug(txt){S.chatInput=txt;sendChat();}
function buildCtx(){var d=computeFromFiles(false);var b='Sos asistente financiero de una PyME argentina. Respondé en español, conciso y accionable.\n\n';if(!d)return b+'Sin datos aún.';return b+'Ventas: '+fmtK(d.totV)+' | Margen: '+fmtK(d.totG)+' ('+pct(d.totG,d.totV)+'%) | Resultado: '+fmtK(d.resultado)+' ('+pct(d.resultado,d.totV)+'%)\nTop cliente: '+((d.clients[0]||{}).nombre||'—')+' | Top producto: '+((d.products[0]||{}).nombre||'—')+'\nClientes: '+d.clients.length+' | Períodos: '+d.months.length;}
async function sendChat(){
  var input=S.chatInput.trim();if(!input||S.chatLoading)return;
  S.chatMsgs.push({role:'user',text:input});S.chatInput='';S.chatLoading=true;renderChat();
  var hasKey=S.apiKey&&S.apiKey.length>10;
  if(!hasKey){
    var d=computeFromFiles(false);
    var demos={'mejor mes':'El período con mayores ventas '+(d&&d.months.length?'fue '+d.months.reduce(function(a,b){return a.ventas>b.ventas?a:b;}).mes:'no disponible')+'.','margen':'Margen bruto: '+(d?pct(d.totG,d.totV)+'%':'—')+'.','equilibrio':(d&&d.totFij&&d.mgContrib&&d.totV?'Punto de equilibrio: '+fmtK(Math.round(d.totFij/(d.mgContrib/d.totV)))+' en ventas.':'Cargá costos fijos para calcularlo.'),'concentraci':'Cliente principal: '+(d&&d.clients.length?d.clients[0].nombre+' ('+pct(d.clients[0].ventas,d.totV)+'% ventas)':'—')+'.'};
    var resp='Para respuestas con IA real, guardá tu clave API en Configuración.';
    for(var k in demos){if(input.toLowerCase().indexOf(k)>=0){resp=demos[k];break;}}
    setTimeout(function(){S.chatMsgs.push({role:'ai',text:resp});S.chatLoading=false;renderChat();},500);return;
  }
  try{
    var msgs=[];S.chatMsgs.slice(0,-1).forEach(function(m){if(m.role==='user'||m.role==='ai')msgs.push({role:m.role==='ai'?'assistant':'user',content:m.text});});msgs.push({role:'user',content:input});
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,system:buildCtx(),messages:msgs})});
    var data=await res.json();S.chatMsgs.push({role:'ai',text:data.content&&data.content[0]?data.content[0].text:'Sin respuesta.'});
  }catch(e){S.chatMsgs.push({role:'ai',text:'Error de conexión.'});}
  S.chatLoading=false;renderChat();
}

// ══════════════════════════════════════════════════════
// TEMPLATES
// ══════════════════════════════════════════════════════
function dlTemplate(id){
  var wb=XLSX.utils.book_new(),f=DEMO_FILES[id];if(!f)return;
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([f.headers]),f.name.replace('.csv',''));
  var exRows=[f.headers].concat(f.rows.map(function(r){return f.headers.map(function(h){return r[h]||'';})}));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(exRows),'Ejemplo');
  if(id==='directos')XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['Categorías'],['Flete y logística'],['Comisiones de venta'],['Embalaje y packaging'],['Descuentos comerciales'],['Financiación y cobranza'],['Garantías y devoluciones']]),'Categorías');
  if(id==='fijos')XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['Categorías'],['Sueldos administrativos'],['Sueldos operativos'],['Alquiler y expensas'],['Servicios (luz/gas/internet)'],['Amortización de equipos'],['Mantenimiento'],['Seguros'],['Honorarios profesionales'],['Marketing y publicidad'],['Impuestos y tasas']]),'Categorías');
  XLSX.writeFile(wb,'template_'+id+'.xlsx');
}
