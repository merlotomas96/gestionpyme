<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gestiónPyME — Control de Gestión</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F3EE;--surface:#FDFCFA;--border:#E2DDD6;--border2:#CBC4BB;
  --text:#1A1714;--text2:#6B6560;--text3:#9E9892;
  --accent:#2A5C45;--accent-light:#E8F0EC;
  --accent2:#C4531A;--accent2-light:#FAF0EA;
  --yellow:#E8C84A;--yellow-light:#FBF7E4;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:10px;--r-sm:6px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;}
.vbadge{font-size:11px;font-family:var(--mono);background:var(--accent-light);color:var(--accent);padding:2px 7px;border-radius:4px;font-weight:500;}
.nav{display:flex;gap:2px;align-items:center;}
.ns{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3);padding:5px 10px;border-radius:20px;cursor:default;white-space:nowrap;}
.ns.active{color:var(--accent);background:var(--accent-light);font-weight:500;}
.ns.done{color:var(--text2);cursor:pointer;}
.ns.done:hover{background:var(--bg);}
.ns-n{width:18px;height:18px;border-radius:50%;border:1px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;}
.ns.done .ns-n{background:var(--accent);border-color:var(--accent);color:#fff;font-size:9px;}
.sep{color:var(--border2);font-size:11px;padding:0 2px;}
.main{max-width:960px;margin:0 auto;padding:28px 24px 48px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px;}
.card-hdr{padding:20px 24px 16px;border-bottom:1px solid var(--border);}
.slabel{font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--accent);text-transform:uppercase;margin-bottom:4px;}
.stitle{font-size:20px;font-weight:600;}
.ssub{font-size:13px;color:var(--text2);margin-top:3px;}
/* UPLOAD */
.dropzone{margin:24px;border:1.5px dashed var(--border2);border-radius:var(--r);padding:36px 24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg);position:relative;}
.dropzone:hover{border-color:var(--accent);background:var(--accent-light);}
.dropzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.dicon{font-size:28px;margin-bottom:10px;}
.dtitle{font-size:15px;font-weight:500;margin-bottom:5px;}
.dsub{font-size:13px;color:var(--text2);margin-bottom:16px;}
.ftags{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.ftag{font-size:11px;font-family:var(--mono);background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:3px 8px;border-radius:4px;}
.divrow{display:flex;align-items:center;gap:12px;margin:0 24px;}
.divline{flex:1;height:1px;background:var(--border);}
.divtxt{font-size:12px;color:var(--text3);}
.paste-wrap{margin:16px 24px 24px;}
.paste-lbl{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;}
textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;font-family:var(--mono);font-size:12px;color:var(--text);resize:vertical;min-height:80px;outline:none;transition:border .15s;line-height:1.6;}
textarea:focus{border-color:var(--accent);}
textarea::placeholder{color:var(--text3);}
/* TEMPLATE */
.template-box{margin:0 24px 24px;background:var(--accent-light);border:1px solid var(--accent);border-radius:var(--r-sm);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.template-txt{font-size:13px;color:var(--accent);}
.template-txt strong{font-weight:600;}
/* TABLE */
.tscroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{background:var(--bg);padding:8px 12px;text-align:left;font-weight:600;color:var(--text2);font-size:11px;letter-spacing:.04em;border-bottom:1px solid var(--border);white-space:nowrap;}
thead th.r{text-align:right;}
tbody td{padding:7px 12px;border-bottom:1px solid var(--border);color:var(--text);}
tbody td.r{text-align:right;font-family:var(--mono);font-size:12px;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--accent-light);}
/* COL GRID */
.col-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;padding:20px 24px;}
.col-card{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);padding:12px;transition:all .15s;}
.col-card.mapped{border-color:var(--accent);background:var(--accent-light);}
.col-name{font-family:var(--mono);font-size:12px;font-weight:500;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.col-sample{font-size:11px;color:var(--text3);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
select{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-sm);padding:6px 8px;font-family:var(--font);font-size:12px;color:var(--text);cursor:pointer;outline:none;}
select:focus{border-color:var(--accent);}
.cbadge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 7px;border-radius:4px;font-weight:500;margin-top:5px;}
.cv{background:var(--accent-light);color:var(--accent);}
.cc{background:var(--accent2-light);color:var(--accent2);}
.cf{background:var(--yellow-light);color:#7A6318;}
.ccl{background:#EEF0FB;color:#3547B8;}
.cp{background:#F5EEFB;color:#7325B8;}
.cq{background:#EEF5FB;color:#1871B8;}
.mapsumm{margin:0 24px 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;}
.mapsumm h4{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.maptags{display:flex;gap:8px;flex-wrap:wrap;}
/* SAVE BANNER */
.save-banner{margin:12px 24px 20px;background:var(--accent);border-radius:var(--r-sm);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.save-banner span{font-size:13px;color:#fff;}
.save-banner.saved{background:#E8F0EC;border:1px solid var(--accent);}
.save-banner.saved span{color:var(--accent);}
/* DASHBOARD */
.dbanner{background:var(--yellow-light);border:1px solid #d4b030;border-radius:var(--r-sm);padding:9px 16px;font-size:12px;color:#7A6318;margin-bottom:20px;}
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
.klbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.kval{font-size:22px;font-weight:600;font-family:var(--mono);}
.kdelta{font-size:12px;margin-top:4px;}
.up{color:var(--accent);}
.warn{color:#7A6318;}
.ptabs{display:flex;gap:4px;margin-bottom:20px;}
.ptab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s;}
.ptab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.cfull{grid-column:1/-1;}
.ccrd{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;}
.ctitle{font-size:14px;font-weight:600;margin-bottom:2px;}
.csub{font-size:12px;color:var(--text3);margin-bottom:14px;}
.legrow{display:flex;gap:16px;margin-bottom:10px;}
.legitem{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);}
.legdot{width:10px;height:10px;border-radius:2px;}
.rankn{font-size:11px;font-family:var(--mono);color:var(--text3);}
.barinl{height:5px;border-radius:3px;margin-top:3px;}
.mgb{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;font-family:var(--mono);}
.mgh{background:var(--accent-light);color:var(--accent);}
.mgm{background:var(--yellow-light);color:#7A6318;}
.mgl{background:var(--accent2-light);color:var(--accent2);}
.ibox{background:var(--yellow-light);border:1px solid #d4b030;border-radius:var(--r-sm);padding:12px 16px;margin-top:16px;font-size:13px;color:#5A4A10;line-height:1.6;}
.ibox strong{font-weight:600;}
.ctabar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:4px;}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:var(--accent);border:none;border-radius:var(--r-sm);font-family:var(--font);font-size:13px;font-weight:500;color:#fff;cursor:pointer;transition:all .15s;}
.btn:hover{background:#22493A;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn2{padding:8px 14px;background:transparent;border:1px solid var(--border2);border-radius:var(--r-sm);font-family:var(--font);font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s;}
.btn2:hover{border-color:var(--text2);color:var(--text);}
.btng{background:none;border:none;font-size:12px;color:var(--text3);cursor:pointer;text-decoration:underline;font-family:var(--font);}
.btng:hover{color:var(--accent2);}
.note{background:var(--accent-light);border:1px solid var(--accent);border-radius:var(--r-sm);padding:10px 16px;margin:16px 24px 0;font-size:13px;color:var(--accent);font-weight:500;}
.chart-svg{display:block;width:100%;overflow:visible;}
@media(max-width:640px){
  .kgrid{grid-template-columns:1fr 1fr;}
  .cgrid{grid-template-columns:1fr;}
  .cfull{grid-column:1;}
  .main{padding:16px 12px 48px;}
  .header{padding:0 12px;}
  .ns span{display:none;}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const TOTAL = 12000000;
const CLIENTES = [
  {nombre:'ElectroMax SA',       pct:.30,margen:.20,categoria:'Celulares'},
  {nombre:'HogarPlus SRL',       pct:.15,margen:.30,categoria:'Línea blanca'},
  {nombre:'Distribuidora Norte', pct:.07,margen:.35,categoria:'Varios'},
  {nombre:'Almacén Central',     pct:.07,margen:.35,categoria:'Varios'},
  {nombre:'Kiosco del Centro',   pct:.06,margen:.35,categoria:'Varios'},
  {nombre:'Ferretería Roca',     pct:.06,margen:.35,categoria:'Varios'},
  {nombre:'Super La Esquina',    pct:.06,margen:.35,categoria:'Varios'},
  {nombre:'MiniMarket 24hs',     pct:.05,margen:.35,categoria:'Varios'},
  {nombre:'El Buen Precio',      pct:.05,margen:.35,categoria:'Varios'},
  {nombre:'Resto clientes',      pct:.09,margen:.35,categoria:'Varios'},
].map(c=>({...c,ventas:Math.round(TOTAL*c.pct),costo:Math.round(TOTAL*c.pct*(1-c.margen)),ganancia:Math.round(TOTAL*c.pct*c.margen)}));

const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const FACT=[.065,.060,.080,.075,.085,.080,.090,.088,.082,.095,.105,.095];
const DATA_M=MESES.map((mes,i)=>({mes,ventas:Math.round(TOTAL*FACT[i]),costos:Math.round(TOTAL*FACT[i]*.724)}));
const DATA_T=[
  {mes:'Q1',ventas:DATA_M.slice(0,3).reduce((s,d)=>s+d.ventas,0),costos:DATA_M.slice(0,3).reduce((s,d)=>s+d.costos,0)},
  {mes:'Q2',ventas:DATA_M.slice(3,6).reduce((s,d)=>s+d.ventas,0),costos:DATA_M.slice(3,6).reduce((s,d)=>s+d.costos,0)},
  {mes:'Q3',ventas:DATA_M.slice(6,9).reduce((s,d)=>s+d.ventas,0),costos:DATA_M.slice(6,9).reduce((s,d)=>s+d.costos,0)},
  {mes:'Q4',ventas:DATA_M.slice(9,12).reduce((s,d)=>s+d.ventas,0),costos:DATA_M.slice(9,12).reduce((s,d)=>s+d.costos,0)},
];

const CATS=[
  {v:'',        l:'— Sin categoría —', b:''},
  {v:'fecha',   l:'📅 Fecha',          b:'cf'},
  {v:'ventas',  l:'💰 Ventas',         b:'cv'},
  {v:'costos',  l:'📦 Costos',         b:'cc'},
  {v:'cliente', l:'👤 Cliente',        b:'ccl'},
  {v:'producto',l:'🏷️ Producto',       b:'cp'},
  {v:'cantidad',l:'🔢 Cantidad',       b:'cq'},
];

const DEMO_CSV = 'Mes\tCliente\tCategoria\tVentas\tCostos\nEne\tElectroMax SA\tCelulares\t300000\t240000\nFeb\tHogarPlus SRL\tLinea blanca\t150000\t105000\nMar\tDistribuidora Norte\tVarios\t84000\t54600\nAbr\tAlmacen Central\tVarios\t84000\t54600\nMay\tKiosco del Centro\tVarios\t72000\t46800';

// ── STATE ─────────────────────────────────────────────────────────────────────
var S = {
  step: 1,
  csvData: null,
  fileName: '',
  mapping: {},
  mappingSaved: false,
  periodo: 'mensual',
  pasteText: '',
  tip: null
};

function setState(patch) {
  Object.assign(S, patch);
  render();
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function fmtK(n) {
  return n >= 1000000 ? '$' + (n/1e6).toFixed(1) + 'M' : '$' + (n/1000).toFixed(0) + 'K';
}

function guessCategory(col) {
  var n = col.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if (/fecha|date|mes|periodo/.test(n)) return 'fecha';
  if (/venta|ingreso|precio|importe|total|factura/.test(n)) return 'ventas';
  if (/costo|gasto|cmp/.test(n)) return 'costos';
  if (/cliente|razon|empresa|nombre/.test(n)) return 'cliente';
  if (/producto|articulo|item|categoria/.test(n)) return 'producto';
  if (/cantidad|qty|unidad/.test(n)) return 'cantidad';
  return '';
}

function parseCSV(text) {
  var lines = text.trim().split('\n').filter(function(l){ return l.trim(); });
  if (lines.length < 2) return null;
  var sep = lines[0].indexOf('\t') >= 0 ? '\t' : lines[0].indexOf(';') >= 0 ? ';' : ',';
  var headers = lines[0].split(sep).map(function(h){ return h.trim().replace(/^["']|["']$/g,''); });
  var rows = lines.slice(1).map(function(l) {
    var vals = l.split(sep).map(function(v){ return v.trim().replace(/^["']|["']$/g,''); });
    var row = {};
    headers.forEach(function(h,i){ row[h] = vals[i] || ''; });
    return row;
  });
  return { headers: headers, rows: rows };
}

function mappedCount() {
  return Object.values(S.mapping).filter(function(v){ return v && v !== ''; }).length;
}

function getMgClass(p) {
  return p >= 35 ? 'mgh' : p >= 28 ? 'mgm' : 'mgl';
}

// ── TEMPLATE DOWNLOAD ─────────────────────────────────────────────────────────
function downloadTemplate() {
  var wb = XLSX.utils.book_new();
  // Sheet 1: template vacío
  var wsEmpty = XLSX.utils.aoa_to_sheet([
    ['Fecha','Cliente','Producto','Categoria','Ventas','Costos','Cantidad']
  ]);
  wsEmpty['!cols'] = [{wch:12},{wch:24},{wch:20},{wch:16},{wch:12},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb, wsEmpty, 'Datos');
  // Sheet 2: ejemplo con 5 filas
  var wsEjemplo = XLSX.utils.aoa_to_sheet([
    ['Fecha','Cliente','Producto','Categoria','Ventas','Costos','Cantidad'],
    ['Ene-2024','ElectroMax SA','iPhone 15','Celulares',350000,280000,5],
    ['Ene-2024','HogarPlus SRL','Heladera Kohinoor','Línea blanca',180000,126000,3],
    ['Feb-2024','Kiosco del Centro','Coca Cola 2L','Bebidas',45000,29000,150],
    ['Feb-2024','Distribuidora Norte','Detergente 1L','Limpieza',32000,20000,80],
    ['Mar-2024','AlmacénCentral','Arroz 1kg','Alimentos',28000,18000,200],
  ]);
  wsEjemplo['!cols'] = [{wch:12},{wch:24},{wch:22},{wch:16},{wch:12},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb, wsEjemplo, 'Ejemplo');
  XLSX.writeFile(wb, 'template_gestionpyme.xlsx');
}

// ── SVG CHARTS ────────────────────────────────────────────────────────────────
function renderAreaChart(data, w, h) {
  var pad = {t:10, r:10, b:28, l:56};
  var cw = w - pad.l - pad.r;
  var ch = h - pad.t - pad.b;
  var maxV = Math.max.apply(null, data.map(function(d){ return d.ventas; })) * 1.1;
  var xs = data.map(function(_,i){ return pad.l + i/(data.length-1)*cw; });
  function yv(d){ return pad.t + ch - (d.ventas/maxV)*ch; }
  function yc(d){ return pad.t + ch - (d.costos/maxV)*ch; }

  var pathV = 'M' + xs.map(function(x,i){ return x.toFixed(1)+','+yv(data[i]).toFixed(1); }).join('L');
  var pathC = 'M' + xs.map(function(x,i){ return x.toFixed(1)+','+yc(data[i]).toFixed(1); }).join('L');
  var fillV = pathV + 'L'+(xs[xs.length-1].toFixed(1))+','+(pad.t+ch)+'L'+(xs[0].toFixed(1))+','+(pad.t+ch)+'Z';
  var fillC = pathC + 'L'+(xs[xs.length-1].toFixed(1))+','+(pad.t+ch)+'L'+(xs[0].toFixed(1))+','+(pad.t+ch)+'Z';

  var yticks = [0,.25,.5,.75,1].map(function(p){
    return {y:(pad.t+ch-p*ch).toFixed(1), val:fmtK(maxV*p)};
  });

  var tipHtml = '';
  if (S.tip) {
    var tx = Math.min(S.tip.x + 8, w - 128);
    var ty = Math.max(S.tip.y - 10, pad.t);
    tipHtml = '<line x1="'+S.tip.x+'" y1="'+pad.t+'" x2="'+S.tip.x+'" y2="'+(pad.t+ch)+'" stroke="#CBC4BB" stroke-width="1"/>'
      + '<rect x="'+tx+'" y="'+ty+'" width="120" height="72" rx="6" fill="#FDFCFA" stroke="#E2DDD6" stroke-width="1"/>'
      + '<text x="'+(tx+8)+'" y="'+(ty+16)+'" font-size="11" font-weight="600" fill="#1A1714" font-family="DM Sans,sans-serif">'+S.tip.d.mes+'</text>'
      + '<text x="'+(tx+8)+'" y="'+(ty+32)+'" font-size="11" fill="#2A5C45" font-family="DM Sans,sans-serif">Ventas: '+fmtK(S.tip.d.ventas)+'</text>'
      + '<text x="'+(tx+8)+'" y="'+(ty+47)+'" font-size="11" fill="#C4531A" font-family="DM Sans,sans-serif">Costos: '+fmtK(S.tip.d.costos)+'</text>'
      + '<text x="'+(tx+8)+'" y="'+(ty+62)+'" font-size="11" fill="#2A5C45" font-weight="600" font-family="DM Sans,sans-serif">Margen: '+Math.round((1-S.tip.d.costos/S.tip.d.ventas)*100)+'%</text>';
  }

  return '<svg viewBox="0 0 '+w+' '+h+'" class="chart-svg" style="height:'+h+'px" onmouseleave="clearTip()">'
    + '<defs>'
    + '<linearGradient id="gv" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stop-color="#2A5C45" stop-opacity="0.15"/><stop offset="95%" stop-color="#2A5C45" stop-opacity="0.02"/></linearGradient>'
    + '<linearGradient id="gc" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stop-color="#C4531A" stop-opacity="0.12"/><stop offset="95%" stop-color="#C4531A" stop-opacity="0.02"/></linearGradient>'
    + '</defs>'
    + yticks.map(function(t){
        return '<line x1="'+pad.l+'" y1="'+t.y+'" x2="'+(pad.l+cw)+'" y2="'+t.y+'" stroke="#E2DDD6" stroke-dasharray="3 3"/>'
          + '<text x="'+(pad.l-6)+'" y="'+t.y+'" text-anchor="end" dominant-baseline="central" fill="#9E9892" font-size="10" font-family="DM Mono,monospace">'+t.val+'</text>';
      }).join('')
    + data.map(function(d,i){
        return '<text x="'+xs[i].toFixed(1)+'" y="'+(pad.t+ch+16)+'" text-anchor="middle" fill="#9E9892" font-size="10" font-family="DM Sans,sans-serif">'+d.mes+'</text>';
      }).join('')
    + '<path d="'+fillV+'" fill="url(#gv)"/>'
    + '<path d="'+fillC+'" fill="url(#gc)"/>'
    + '<path d="'+pathV+'" fill="none" stroke="#2A5C45" stroke-width="2" stroke-linejoin="round"/>'
    + '<path d="'+pathC+'" fill="none" stroke="#C4531A" stroke-width="2" stroke-linejoin="round"/>'
    + xs.map(function(x,i){
        var d = data[i];
        var ty2 = Math.min(yv(d), yc(d));
        return '<rect x="'+(x-14).toFixed(1)+'" y="'+pad.t+'" width="28" height="'+ch+'" fill="transparent"'
          + ' onmouseenter="showTip('+x.toFixed(1)+','+ty2.toFixed(1)+','+JSON.stringify(d)+')"/>';
      }).join('')
    + tipHtml
    + '</svg>';
}

function renderBarChart(data, w, h) {
  var pad = {t:10, r:10, b:36, l:56};
  var cw = w - pad.l - pad.r;
  var ch = h - pad.t - pad.b;
  var maxV = Math.max.apply(null, data.map(function(d){ return d.ventas; })) * 1.1;
  var bw = Math.floor(cw / data.length);
  var gap = 6;
  var bwi = Math.floor((bw - gap*3) / 2);

  var yticks = [0,.25,.5,.75,1].map(function(p){
    return {y:(pad.t+ch-p*ch).toFixed(1), val:fmtK(maxV*p)};
  });

  return '<svg viewBox="0 0 '+w+' '+h+'" class="chart-svg" style="height:'+h+'px">'
    + yticks.map(function(t){
        return '<line x1="'+pad.l+'" y1="'+t.y+'" x2="'+(pad.l+cw)+'" y2="'+t.y+'" stroke="#E2DDD6" stroke-dasharray="3 3"/>'
          + '<text x="'+(pad.l-6)+'" y="'+t.y+'" text-anchor="end" dominant-baseline="central" fill="#9E9892" font-size="10" font-family="DM Mono,monospace">'+t.val+'</text>';
      }).join('')
    + data.map(function(d,i){
        var x = pad.l + i*bw + gap;
        var hv = Math.round((d.ventas/maxV)*ch);
        var hg = Math.round((d.ganancia/maxV)*ch);
        var ybase = pad.t + ch;
        var lbl = d.seg.length > 14 ? d.seg.substring(0,13)+'…' : d.seg;
        return '<rect x="'+x+'" y="'+(ybase-hv)+'" width="'+bwi+'" height="'+hv+'" fill="#E8F0EC" rx="3"/>'
          + '<rect x="'+(x+bwi+gap)+'" y="'+(ybase-hg)+'" width="'+bwi+'" height="'+hg+'" fill="#2A5C45" rx="3"/>'
          + '<text x="'+(x+bwi).toFixed(1)+'" y="'+(ybase+16)+'" text-anchor="middle" fill="#9E9892" font-size="9" font-family="DM Sans,sans-serif">'+lbl+'</text>';
      }).join('')
    + '</svg>';
}

// ── RENDER SECTIONS ───────────────────────────────────────────────────────────
function renderHeader() {
  var steps = ['Importar','Categorizar','Dashboard','Chat IA'];
  return '<div class="header">'
    + '<div class="logo"><div class="logo-dot"></div>gestiónPyME<span class="vbadge">v1.0</span></div>'
    + '<div class="nav">'
    + steps.map(function(st,i){
        var cls = S.step===i+1 ? 'active' : S.step>i+1 ? 'done' : '';
        var click = S.step>i+1 ? ' onclick="goStep('+(i+1)+')"' : '';
        return (i>0?'<span class="sep">›</span>':'')
          + '<div class="ns '+cls+'"'+click+'>'
          + '<div class="ns-n">'+(S.step>i+1?'✓':i+1)+'</div>'
          + '<span>'+st+'</span></div>';
      }).join('')
    + '</div></div>';
}

    + '<div class="ssub"><strong>'+S.fileName+'</strong> — '+S.csvData.rows.length+' filas, '+S.csvData.headers.length+' columnas. <button class="btng" onclick="goStep(1)">Cambiar archivo</button></div>'
    + '</div>'
    + '<div class="note">✓ Datos cargados — revisá la vista previa y categorizá cada columna</div>'
    + '<div style="padding:16px 24px">'

    + '<span style="font-size:12px;color:var(--text3);font-family:var(--mono)">'+Math.min(4,S.csvData.rows.length)+' de '+S.csvData.rows.length+' filas</span>'
    + '</div>'

    + '<table><thead><tr>'+S.csvData.headers.map(function(h){ return '<th>'+h+'</th>'; }).join('')+'</tr></thead>'
    + '<tbody>'+S.csvData.rows.slice(0,4).map(function(r){
        return '<tr>'+S.csvData.headers.map(function(h){ return '<td>'+(r[h]||'')+'</td>'; }).join('')+'</tr>';
      }).join('')+'</tbody></table>'
    + (S.csvData.rows.length>4?'<div style="text-align:center;padding:6px;font-size:11px;color:var(--text3);background:var(--bg);border-top:1px solid var(--border)">+'+(S.csvData.rows.length-4)+' filas más</div>':'')
    + '</div></div>'

    + '<div class="slabel" style="margin-bottom:4px">Capa semántica</div>'
    + '<div style="font-size:13px;color:var(--text2);margin-bottom:4px">¿Qué representa cada columna? Detectamos '+mc+' de '+S.csvData.headers.length+' automáticamente.</div>'
    + '</div>'
    + '<div class="col-grid">'

          + '<div class="col-sample">ej: '+(sample||'—')+'</div>'
          + '<select onchange="setMap(\''+col+'\',this.value)">'

          + '</select>'
          + (val&&cat?'<div class="cbadge '+cat.b+'">'+cat.l+'</div>':'')
          + '</div>';
      }).join('')
    + '</div>'
    + '<div class="mapsumm">'
    + '<h4>Resumen del mapeo</h4>'

        var cols = S.csvData.headers.filter(function(h){ return S.mapping[h]===cat.v; });

    + '</div></div>'
    + '<div class="'+(S.mappingSaved?'save-banner saved':'save-banner')+'">'
    + '<span>'+(S.mappingSaved?'✓ Segmentación guardada — podés continuar al dashboard':'Guardá la segmentación antes de continuar')+'</span>'

function renderStep3() {
  var data = S.periodo==='mensual' ? DATA_M : DATA_T;

  var seg1G = CLIENTES[0].ganancia;

  var segData = [
    {seg:'ElectroMax (30%)', ventas:CLIENTES[0].ventas, ganancia:seg1G,             mg:20},
    {seg:'HogarPlus (15%)',  ventas:CLIENTES[1].ventas, ganancia:CLIENTES[1].ganancia, mg:30},

    + '<div class="kpi"><div class="klbl">Ganancia bruta</div><div class="kval">'+fmtK(totG)+'</div><div class="kdelta up">↑ 22% vs año anterior</div></div>'
    + '<div class="kpi"><div class="klbl">Margen global</div><div class="kval warn">'+mg+'%</div><div class="kdelta warn">⚠ Arrastrado por cliente 1</div></div>'
    + '<div class="kpi"><div class="klbl">Clientes activos</div><div class="kval">10</div><div class="kdelta up">1 cliente = 30% del total</div></div>'
    + '</div>'
    + '<div class="ptabs">'
    + '<button class="ptab'+(S.periodo==='mensual'?' active':'')+'" onclick="setState({periodo:\'mensual\'})">Mensual</button>'
    + '<button class="ptab'+(S.periodo==='trimestral'?' active':'')+'" onclick="setState({periodo:\'trimestral\'})">Trimestral</button>'

    + '<div class="tscroll"><table><thead><tr><th>#</th><th>Cliente</th><th class="r">Ventas</th><th class="r">Margen</th></tr></thead><tbody>'
    + CLIENTES.map(function(c,i){
        return '<tr><td><span class="rankn">#'+(i+1)+'</span></td>'

          + '<td class="r">'+fmtK(c.ventas)+'</td>'

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  var html = renderHeader() + '<div class="main">';
  if (S.step===1) html += renderStep1();
  else if (S.step===2 && S.csvData) html += renderStep2();
  else if (S.step===3) html += renderStep3();
  html += '</div>';
  document.getElementById('app').innerHTML = html;
}

// ── HANDLERS ──────────────────────────────────────────────────────────────────
function goStep(n) {
  setState({ step: n });
}

function setMap(col, val) {
  S.mapping[col] = val;
  S.mappingSaved = false;
  render();
}

function saveMapping() {
  setState({ mappingSaved: true });
}

function loadDemo() {
  var ta = document.getElementById('ta');
  if (ta) ta.value = DEMO_CSV;
  S.pasteText = DEMO_CSV;
  render();
}

function processPaste() {
  var text = S.pasteText || (document.getElementById('ta') ? document.getElementById('ta').value : '');
  if (!text.trim()) return;
  var p = parseCSV(text);
  if (p) {
    var auto = {};
    p.headers.forEach(function(h){ auto[h] = guessCategory(h); });
    setState({ csvData: p, fileName: 'datos pegados', mapping: auto, mappingSaved: false, step: 2 });
  } else {
    alert('No se detectó estructura. Asegurate de incluir encabezados en la primera fila.');
  }
}

function loadFileData(file) {
  var ext = file.name.split('.').pop().toLowerCase();
  if (ext==='csv' || ext==='txt') {
    var r = new FileReader();
    r.onload = function(e) {
      var p = parseCSV(e.target.result);
      if (p) {
        var auto = {};
        p.headers.forEach(function(h){ auto[h] = guessCategory(h); });
        setState({ csvData: p, fileName: file.name, mapping: auto, mappingSaved: false, step: 2 });
      }
    };
    r.readAsText(file, 'UTF-8');
  } else if (ext==='xlsx' || ext==='xls') {
    var r2 = new FileReader();
    r2.onload = function(e) {
      var wb = XLSX.read(e.target.result, { type:'array' });
      var ws = wb.Sheets[wb.SheetNames[0]];
      var json = XLSX.utils.sheet_to_json(ws, { defval:'' });
      if (json.length > 0) {
        var headers = Object.keys(json[0]);
        var auto = {};
        headers.forEach(function(h){ auto[h] = guessCategory(h); });
        setState({ csvData:{ headers:headers, rows:json }, fileName:file.name, mapping:auto, mappingSaved:false, step:2 });
      }
    };
    r2.readAsArrayBuffer(file);
  }
}

function handleFileInput(e) {
  if (e.target.files[0]) loadFileData(e.target.files[0]);
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('dz') && document.getElementById('dz').classList.remove('drag');
  if (e.dataTransfer.files[0]) loadFileData(e.dataTransfer.files[0]);
}

function showTip(x, y, d) {
  S.tip = { x:x, y:y, d:d };
  render();
}

function clearTip() {
  if (S.tip) { S.tip = null; render(); }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
