<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gestiónPyME</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0EEE9;--surface:#FFFFFF;--s2:#F7F5F0;--s3:#EDEBE5;
  --border:#E2DDD6;--border2:#C8C2B8;
  --text:#111110;--t2:#5C5650;--t3:#9C9790;
  --accent:#1C3F2C;--al:#E6EFE9;--ad:#122B1D;
  --red:#B84020;--rl:#FAEAE4;
  --gold:#A07010;--gl:#FAF4E0;
  --blue:#1A3A6B;--bl:#E8EFF8;
  --purple:#5C2D8A;--pl:#F0EAF8;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:8px;--rs:4px;--rl:12px;
  --sh:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  --sh2:0 4px 16px rgba(0,0,0,.07),0 2px 6px rgba(0,0,0,.04);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;min-height:100vh;display:flex;flex-direction:column;}

/* ── TOPBAR ── */
.topbar{background:var(--accent);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:200;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:26px;height:26px;background:rgba(255,255,255,.15);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:13px;height:13px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.logo-text{font-size:13px;font-weight:600;color:#fff;letter-spacing:.01em;}
.logo-text span{opacity:.6;font-weight:400;}
.vbadge{font-size:9px;font-family:var(--mono);background:rgba(255,255,255,.12);color:rgba(255,255,255,.7);padding:2px 6px;border-radius:3px;letter-spacing:.05em;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.topbar-status{font-size:11px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:5px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:#4CAF50;}

/* ── SHELL ── */
.shell{display:flex;flex:1;min-height:0;}

/* ── SIDEBAR ── */
.sidebar{width:200px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;}
.sb-group{padding:12px 8px 4px;}
.sb-label{font-size:9px;font-weight:600;letter-spacing:.1em;color:var(--t3);text-transform:uppercase;padding:0 8px 6px;}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--r);cursor:pointer;transition:all .12s;font-size:12px;color:var(--t2);margin-bottom:1px;}
.sb-item:hover{background:var(--bg);}
.sb-item.active{background:var(--al);color:var(--accent);font-weight:500;}
.sb-icon{width:16px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.7;}
.sb-item.active .sb-icon{opacity:1;}
.sb-divider{height:1px;background:var(--border);margin:6px 12px;}
.sb-badge{margin-left:auto;font-size:9px;font-family:var(--mono);padding:1px 5px;border-radius:3px;background:var(--gl);color:var(--gold);}
.sb-badge.ok{background:var(--al);color:var(--accent);}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;background:var(--bg);}
.page{display:none;}
.page.active{display:block;}

/* ── HOME HERO ── */
.home-hero{background:var(--accent);padding:60px 56px 52px;color:#fff;position:relative;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;}
.home-hero::after{content:'';position:absolute;right:0;top:0;width:50%;height:100%;background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,.025) 100%);pointer-events:none;}
.hero-left{}
.hero-right{position:relative;z-index:1;}
.hero-eyebrow{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.hero-eyebrow::before{content:'';display:block;width:16px;height:1px;background:rgba(255,255,255,.3);}
.hero-h{font-size:38px;font-weight:300;letter-spacing:-.04em;line-height:1.1;margin-bottom:8px;}
.hero-h strong{font-weight:700;}
.hero-hr{width:40px;height:2px;background:rgba(255,255,255,.25);margin:18px 0;}
.hero-sub{font-size:15px;color:rgba(255,255,255,.7);max-width:500px;line-height:1.8;font-weight:300;margin-bottom:28px;}
.hero-cta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.btn-hero{padding:12px 26px;background:#fff;color:var(--accent);border:none;border-radius:var(--rs);font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.09em;text-transform:uppercase;transition:all .2s;}
.btn-hero:hover{background:#F0F7F3;transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.15);}
.hero-note{font-size:11px;color:rgba(255,255,255,.4);}
.hero-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:48px;padding-top:36px;border-top:1px solid rgba(255,255,255,.1);}
.hero-gi{padding:0 24px 0 0;}
.hero-gi:first-child{padding-left:0;}
.hero-gi+.hero-gi{border-left:1px solid rgba(255,255,255,.1);padding-left:24px;}
.hero-gi-label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:8px;}
.hero-gi-text{font-size:13px;color:rgba(255,255,255,.85);line-height:1.65;font-weight:300;}
.hero-gi-text strong{font-weight:600;color:#fff;}
.dash-mock{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:14px;backdrop-filter:blur(4px);}
.mock-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.mock-title{font-size:10px;font-weight:600;color:rgba(255,255,255,.9);letter-spacing:.04em;}
.mock-tabs{display:flex;gap:3px;}
.mock-tab{font-size:9px;padding:2px 8px;border-radius:3px;color:rgba(255,255,255,.4);}
.mock-tab.active{background:rgba(255,255,255,.15);color:#fff;}
.mock-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;}
.mock-kpi{background:rgba(255,255,255,.08);border-radius:6px;padding:8px 10px;}
.mock-kpi-lbl{font-size:8px;color:rgba(255,255,255,.45);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
.mock-kpi-val{font-size:15px;font-weight:700;font-family:var(--mono);color:#fff;}
.mock-kpi-delta{font-size:8px;margin-top:2px;}
.mock-kpi-delta.up{color:#6FD4A0;}
.mock-kpi-delta.dn{color:#F4886A;}
.mock-chart-area{background:rgba(255,255,255,.05);border-radius:6px;padding:10px;margin-bottom:8px;}
.mock-chart-label{font-size:8px;color:rgba(255,255,255,.4);margin-bottom:8px;letter-spacing:.05em;text-transform:uppercase;}
.mock-rows{display:flex;flex-direction:column;gap:5px;}
.mock-row{display:flex;align-items:center;gap:8px;}
.mock-row-lbl{font-size:9px;color:rgba(255,255,255,.6);width:90px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mock-row-bar-wrap{flex:1;background:rgba(255,255,255,.08);border-radius:2px;height:6px;overflow:hidden;}
.mock-row-bar{height:100%;border-radius:2px;transition:width .4s;}
.mock-row-val{font-size:9px;font-family:var(--mono);color:rgba(255,255,255,.7);width:36px;text-align:right;flex-shrink:0;}
.mock-badges{display:flex;gap:5px;flex-wrap:wrap;}
.mock-badge{font-size:8px;padding:2px 7px;border-radius:3px;font-family:var(--mono);}
.mock-badge.g{background:rgba(111,212,160,.2);color:#6FD4A0;}
.mock-badge.r{background:rgba(244,136,106,.2);color:#F4886A;}
.mock-badge.y{background:rgba(212,180,80,.2);color:#D4B450;}

/* ── HOME BODY ── */
.home-body{padding:52px 56px;max-width:1200px;}
.sec-label{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
.sec-h{font-size:24px;font-weight:300;letter-spacing:-.03em;margin-bottom:6px;}
.sec-h strong{font-weight:700;}
.sec-rule{width:32px;height:2px;background:var(--accent);opacity:.25;margin:14px 0 18px;}
.sec-sub{font-size:13px;color:var(--t2);max-width:560px;line-height:1.8;margin-bottom:32px;}

/* ── BENEFITS ── */
.ben-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:52px;}
.ben{background:var(--surface);padding:24px 22px;}
.ben-n{font-size:9px;font-family:var(--mono);color:var(--t3);margin-bottom:12px;letter-spacing:.04em;}
.ben-title{font-size:12px;font-weight:600;margin-bottom:7px;letter-spacing:-.01em;}
.ben-desc{font-size:12px;color:var(--t2);line-height:1.7;}

/* ── FLOW ── */
.flow-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:52px;}
.flow-item{background:var(--surface);padding:22px 20px;}
.flow-step{font-size:9px;font-family:var(--mono);color:var(--t3);letter-spacing:.04em;margin-bottom:12px;}
.flow-icon{font-size:18px;margin-bottom:8px;}
.flow-title{font-size:12px;font-weight:600;margin-bottom:4px;}
.flow-desc{font-size:11px;color:var(--t2);line-height:1.65;}

/* ── CASES ── */
.cases-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:52px;}
.case-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:22px;transition:all .2s;box-shadow:var(--sh);}
.case-card:hover{box-shadow:var(--sh2);transform:translateY(-1px);}
.case-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.case-ico{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.case-size{font-size:9px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);background:var(--bg);border:1px solid var(--border);padding:2px 6px;border-radius:3px;}
.case-type{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:4px;}
.case-title{font-size:13px;font-weight:600;margin-bottom:7px;letter-spacing:-.01em;}
.case-desc{font-size:11px;color:var(--t2);line-height:1.7;margin-bottom:12px;}
.case-tags{display:flex;gap:4px;flex-wrap:wrap;}
.case-tag{font-size:9px;font-family:var(--mono);background:var(--bg);border:1px solid var(--border);padding:2px 6px;border-radius:3px;color:var(--t2);}

/* ── CLOSING ── */
.closing{background:var(--accent);border-radius:var(--rl);padding:36px 44px;display:flex;align-items:center;justify-content:space-between;gap:24px;margin-bottom:8px;}
.closing-h{font-size:18px;font-weight:300;letter-spacing:-.02em;color:#fff;margin-bottom:4px;}
.closing-h strong{font-weight:700;}
.closing-sub{font-size:12px;color:rgba(255,255,255,.55);}
.btn-closing{padding:11px 22px;background:#fff;color:var(--accent);border:none;border-radius:var(--rs);font-family:var(--font);font-size:10px;font-weight:700;cursor:pointer;letter-spacing:.09em;text-transform:uppercase;transition:all .2s;white-space:nowrap;}
.btn-closing:hover{background:#F0F7F3;}

/* ── HOWTO PAGE ── */
.howto-body{padding:52px 56px;max-width:1200px;}
.steps{margin-bottom:48px;}
.step-row{display:flex;gap:24px;padding:24px 0;border-bottom:1px solid var(--border);}
.step-row:last-child{border-bottom:none;}
.step-left{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:40px;}
.step-n{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;font-family:var(--mono);}
.step-line{flex:1;width:1px;background:var(--border);margin-top:4px;}
.step-row:last-child .step-line{display:none;}
.step-body{flex:1;padding-top:3px;}
.step-lbl{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:4px;}
.step-title{font-size:15px;font-weight:600;letter-spacing:-.02em;margin-bottom:7px;}
.step-desc{font-size:12px;color:var(--t2);line-height:1.8;margin-bottom:9px;}
.step-tip{background:var(--al);border-left:2px solid var(--accent);padding:9px 13px;font-size:11px;color:var(--accent);line-height:1.65;}

/* ── CASE STUDY ── */
.case-study{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:44px;box-shadow:var(--sh);}
.cs-hdr{background:var(--accent);padding:28px 32px;color:#fff;}
.cs-tag{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:6px;}
.cs-title{font-size:18px;font-weight:300;letter-spacing:-.02em;margin-bottom:3px;}
.cs-title strong{font-weight:700;}
.cs-sub{font-size:12px;color:rgba(255,255,255,.6);}
.cs-step{display:flex;border-bottom:1px solid var(--border);}
.cs-step:last-child{border-bottom:none;}
.cs-num{width:52px;flex-shrink:0;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--border2);border-right:1px solid var(--border);font-family:var(--mono);}
.cs-body{padding:16px 22px;flex:1;}
.cs-title2{font-size:12px;font-weight:600;margin-bottom:3px;}
.cs-desc{font-size:11px;color:var(--t2);line-height:1.65;}
.cs-result{margin-top:8px;display:inline-flex;align-items:center;gap:5px;background:var(--al);border-radius:var(--rs);padding:5px 10px;font-size:10px;color:var(--accent);font-weight:500;}

/* ── DATA PAGES ── */
.page-wrap{padding:28px 32px;}
.page-header{margin-bottom:24px;}
.page-title{font-size:20px;font-weight:600;letter-spacing:-.02em;margin-bottom:3px;}
.page-sub{font-size:12px;color:var(--t2);}

/* ── NOTE BOXES ── */
.note-y{background:var(--gl);border:1px solid #D4B030;border-radius:var(--rs);padding:8px 13px;margin-bottom:14px;font-size:11px;color:#6B5010;}
.note-g{background:var(--al);border:1px solid var(--accent);border-radius:var(--rs);padding:8px 13px;margin-bottom:14px;font-size:11px;color:var(--accent);}

/* ── MODULE GRID ── */
.mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:20px;}
.mod{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;transition:all .15s;box-shadow:var(--sh);}
.mod.loaded{border-color:var(--accent);background:#FAFCFB;}
.mod.demo-loaded{border-color:var(--gold);}
.mod.optional{border-style:dashed;}
.mod-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.mod-icon{font-size:16px;}
.mod-badge{font-size:9px;font-family:var(--mono);padding:2px 6px;border-radius:3px;font-weight:500;}
.mbr{background:var(--al);color:var(--accent);}
.mbo{background:var(--gl);color:var(--gold);}
.mbd{background:var(--gl);color:var(--gold);}
.mod-title{font-size:12px;font-weight:600;margin-bottom:3px;}
.mod-desc{font-size:11px;color:var(--t2);margin-bottom:10px;line-height:1.5;}
.mod-btns{display:flex;gap:6px;flex-wrap:wrap;}
.mod-status{font-size:10px;margin-top:6px;font-weight:500;}
.mst-demo{color:var(--gold);}
.mst-real{color:var(--accent);}
.dz{flex:1;border:1px dashed var(--border2);border-radius:var(--rs);padding:6px 10px;text-align:center;cursor:pointer;font-size:10px;color:var(--t2);position:relative;transition:all .15s;background:var(--bg);}
.dz:hover{border-color:var(--accent);color:var(--accent);background:var(--al);}
.dz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}

/* ── TABLE ── */
.tscroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:11px;}
thead th{background:var(--bg);padding:7px 12px;text-align:left;font-weight:600;color:var(--t2);font-size:10px;letter-spacing:.05em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;}
thead th.r{text-align:right;}
tbody td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text);}
tbody td.r{text-align:right;font-family:var(--mono);font-size:11px;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--al);}

/* ── MAPEO ── */
.col-tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap;}
.col-tab{padding:5px 12px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--t2);transition:all .15s;font-family:var(--font);}
.col-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.col-tab.done{border-color:var(--accent);color:var(--accent);background:var(--al);}
.col-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;}
.col-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:10px;transition:all .15s;}
.col-card.mapped{border-color:var(--accent);background:var(--al);}
.col-name{font-family:var(--mono);font-size:10px;font-weight:500;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.col-sample{font-size:10px;color:var(--t3);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
select{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:var(--rs);padding:5px 6px;font-family:var(--font);font-size:11px;color:var(--text);cursor:pointer;outline:none;}
select:focus{border-color:var(--accent);}
.cbadge{display:inline-flex;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:500;margin-top:4px;}
.cv{background:var(--al);color:var(--accent);}
.cc{background:var(--rl);color:var(--red);}
.cf{background:var(--gl);color:var(--gold);}
.ccl{background:var(--bl);color:var(--blue);}
.cp{background:var(--pl);color:var(--purple);}
.cq{background:#EEF5FB;color:#1A3A6B;}
.cpr{background:var(--al);color:var(--accent);}

/* ── DASHBOARD ── */
.dash-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.dash-toggle{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--bg);}
.dtab{padding:7px 16px;font-size:11px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--t2);transition:all .12s;font-family:var(--font);white-space:nowrap;}
.dtab.active{background:var(--surface);color:var(--accent);font-weight:600;}
.dtab:not(:last-child){border-right:1px solid var(--border);}
.demo-bar{background:var(--gl);border-bottom:1px solid #D4B030;padding:7px 32px;font-size:11px;color:#6B5010;display:flex;align-items:center;justify-content:space-between;gap:8px;}

/* ── KPI TILES ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:20px 32px 0;margin-bottom:20px;}
.kpi-tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;box-shadow:var(--sh);}
.kpi-label{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;}
.kpi-val{font-size:22px;font-weight:700;font-family:var(--mono);letter-spacing:-.03em;margin-bottom:4px;}
.kpi-val.up{color:var(--accent);}
.kpi-val.dn{color:var(--red);}
.kpi-val.warn{color:var(--gold);}
.kpi-delta{font-size:10px;color:var(--t3);}
.kpi-delta.up{color:var(--accent);}
.kpi-delta.dn{color:var(--red);}

/* ── CHART AREA ── */
.dash-body{padding:0 32px 32px;}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.chart-full{grid-column:1/-1;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px;box-shadow:var(--sh);}
.chart-title{font-size:12px;font-weight:600;letter-spacing:-.01em;margin-bottom:2px;}
.chart-sub{font-size:10px;color:var(--t3);margin-bottom:14px;}
.legrow{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.legitem{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t2);}
.legdot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.rankn{font-size:10px;font-family:var(--mono);color:var(--t3);}
.bar-inl{height:3px;border-radius:2px;margin-top:3px;}
.mgb{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:600;font-family:var(--mono);}
.mgh{background:var(--al);color:var(--accent);}
.mgm{background:var(--gl);color:var(--gold);}
.mgl{background:var(--rl);color:var(--red);}
.ibox{background:var(--gl);border:1px solid #D4B030;border-radius:var(--rs);padding:10px 13px;margin-top:12px;font-size:11px;color:#5A4208;line-height:1.65;}
.cascade{width:100%;border-collapse:collapse;font-size:11px;}
.cascade td{padding:7px 10px;border-bottom:1px solid var(--border);}
.cascade tr:last-child td{border-bottom:none;}
.cascade .lbl{color:var(--t2);}
.cascade .val{text-align:right;font-family:var(--mono);font-weight:500;}
.cascade .val.r{color:var(--red);}
.cascade .val.g{color:var(--accent);}
.cascade .sub td{background:var(--bg);}
.cascade .sub .lbl{padding-left:16px;font-size:10px;color:var(--t3);}
.cascade .tot td{background:var(--al);font-weight:600;color:var(--accent);}
.cascade .wneg td{background:var(--rl);color:var(--red);font-weight:600;}
.chart-svg{display:block;width:100%;overflow:visible;}

/* ── CHART BUILDER ── */
.cb-wrap{background:var(--s2);border:1px solid var(--border);border-radius:var(--rl);padding:20px;margin-top:14px;}
.cb-types{display:flex;gap:6px;margin-bottom:14px;}
.cb-type{flex:1;padding:8px 6px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);cursor:pointer;font-family:var(--font);font-size:10px;color:var(--t2);text-align:center;transition:all .12s;}
.cb-type.active{border-color:var(--accent);background:var(--al);color:var(--accent);font-weight:600;}
.cb-fields{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:14px;}
.cb-lbl{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:5px;}
.cb-chart{min-height:260px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);display:flex;align-items:center;justify-content:center;}

/* ── KPI PAGE ── */
.kpi-filters{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 18px;margin-bottom:16px;display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start;box-shadow:var(--sh);}
.kf-g{display:flex;flex-direction:column;gap:5px;min-width:150px;}
.kf-lbl{font-size:9px;font-weight:600;letter-spacing:.1em;color:var(--t3);text-transform:uppercase;}
.kf-sel{background:var(--bg);border:1px solid var(--border2);border-radius:var(--rs);padding:5px 8px;font-family:var(--font);font-size:11px;color:var(--text);cursor:pointer;outline:none;width:100%;}
.kf-sel:focus{border-color:var(--accent);}
.kf-months{display:flex;gap:4px;flex-wrap:wrap;}
.kf-month{font-size:10px;padding:3px 8px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--t2);cursor:pointer;transition:all .12s;user-select:none;}
.kf-month.sel{background:var(--accent);color:#fff;border-color:var(--accent);}
.kpi-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:20px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;position:relative;box-shadow:var(--sh);transition:all .15s;}
.kpi-card:hover{box-shadow:var(--sh2);}
.kpi-card.custom{border-left:3px solid var(--accent);}
.kpi-card-lbl{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;}
.kpi-card-val{font-size:24px;font-weight:700;font-family:var(--mono);letter-spacing:-.03em;margin-bottom:3px;}
.kpi-card-form{font-size:9px;color:var(--t3);font-family:var(--mono);margin-bottom:8px;}
.kpi-card-trend{height:32px;margin-top:4px;}
.kpi-card-meta{font-size:10px;margin-top:3px;}
.kpi-del{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--t3);cursor:pointer;font-size:12px;padding:2px 5px;border-radius:3px;}
.kpi-del:hover{background:var(--rl);color:var(--red);}
.kpi-builder{background:var(--s2);border:1px dashed var(--border2);border-radius:var(--rl);padding:18px;margin-bottom:16px;}
.kbg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.kb-lbl{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:4px;}
.kb-in{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:var(--rs);padding:6px 9px;font-family:var(--font);font-size:11px;color:var(--text);outline:none;}
.kb-in:focus{border-color:var(--accent);}

/* ── CHAT ── */
.chat-wrap{display:flex;flex-direction:column;height:440px;border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh);}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;background:var(--bg);}
.msg{max-width:80%;padding:9px 13px;border-radius:10px;font-size:12px;line-height:1.65;}
.msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:3px;}
.msg.ai{align-self:flex-start;background:var(--surface);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:3px;}
.chat-sugs{padding:8px 14px 0;display:flex;gap:5px;flex-wrap:wrap;background:var(--surface);border-top:1px solid var(--border);}
.sug{font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--t2);cursor:pointer;transition:all .12s;}
.sug:hover{border-color:var(--accent);color:var(--accent);background:var(--al);}
.chat-input-row{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--surface);}
.chat-in{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:8px 14px;font-family:var(--font);font-size:12px;color:var(--text);outline:none;}
.chat-in:focus{border-color:var(--accent);}
.api-row{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--gl);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.api-row label{font-size:10px;color:#6B5010;font-weight:500;white-space:nowrap;}
.api-in{flex:1;min-width:160px;background:#fff;border:1px solid #D4B030;border-radius:var(--rs);padding:5px 8px;font-family:var(--mono);font-size:10px;color:var(--text);outline:none;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;background:var(--accent);border:none;border-radius:var(--rs);font-family:var(--font);font-size:11px;font-weight:500;color:#fff;cursor:pointer;transition:all .12s;}
.btn:hover{background:var(--ad);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn.sm{padding:4px 9px;font-size:10px;}
.btn.gold{background:var(--gold);}
.btn.gold:hover{background:#7A5808;}
.btn.out{background:transparent;border:1px solid var(--border2);color:var(--t2);}
.btn.out:hover{border-color:var(--text);color:var(--text);}
.btn.danger{background:var(--red);}
.btng{background:none;border:none;font-size:10px;color:var(--t3);cursor:pointer;text-decoration:underline;font-family:var(--font);}
.savebar{padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--s2);}
textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;font-family:var(--mono);font-size:11px;color:var(--text);resize:vertical;min-height:70px;outline:none;}
textarea:focus{border-color:var(--accent);}
textarea::placeholder{color:var(--t3);}
.divrow{display:flex;align-items:center;gap:10px;margin:14px 0 10px;}
.divline{flex:1;height:1px;background:var(--border);}
.divtxt{font-size:10px;color:var(--t3);}
.sec-div{height:1px;background:var(--border);margin:40px 0;}

/* EMPTY */
.empty{text-align:center;padding:60px 24px;}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.4;}
.empty-title{font-size:16px;font-weight:600;margin-bottom:6px;}
.empty-sub{font-size:12px;color:var(--t2);margin-bottom:20px;}

// Formato: max 3 dígitos. <1K → entero. 1K-999K → K (1 dec). 1M-999M → M (2 dec). 1B+ → MM (2 dec).
function fmtK(n){if(!n||isNaN(n))return'$0';var a=Math.abs(n),s=n<0?'-':'';if(a>=1e9)return s+'$'+(a/1e9).toFixed(2).replace(/\.?0+$/,'')+'MM';if(a>=1e6)return s+'$'+(a/1e6).toFixed(2).replace(/\.?0+$/,'')+'M';if(a>=1e3)return s+'$'+(a/1e3).toFixed(1).replace(/\.?0+$/,'')+'K';return s+'$'+Math.round(a);}
function fmtV(v,p){return p?(Math.round(v*10)/10)+'%':fmtK(v);}
function pct(a,b){return b?Math.round(a/b*100):0;}
function getMgC(p){return p>=35?'mgh':p>=28?'mgm':'mgl';}
function num(v){return parseFloat(String(v).replace(/[^0-9.-]/g,''))||0;}
function guessCategory(col){
  var n=col.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if(/fecha|date|mes|periodo/.test(n))return'fecha';
  if(/venta|ingreso|precio|importe|total|factura/.test(n))return'ventas';
  if(/costo|gasto|cmp|monto/.test(n))return'costos';
  if(/cliente|razon|empresa|comprador/.test(n))return'cliente';
  if(/proveedor|supplier|vendor/.test(n))return'proveedor';
  if(/producto|articulo|item|categoria|concepto/.test(n))return'producto';
  if(/cantidad|qty|unidad|horas/.test(n))return'cantidad';
  return'';
}
function parseCSV(text){
  var lines=text.trim().split('\n').filter(function(l){return l.trim();});
  if(lines.length<2)return null;
  var sep=lines[0].indexOf('\t')>=0?'\t':lines[0].indexOf(';')>=0?';':',';
  var headers=lines[0].split(sep).map(function(h){return h.trim().replace(/^["']|["']$/g,'');});
  var rows=lines.slice(1).map(function(l){var vals=l.split(sep).map(function(v){return v.trim().replace(/^["']|["']$/g,'');});var row={};headers.forEach(function(h,i){row[h]=vals[i]||'';});return row;});
  return{headers:headers,rows:rows};
}

function allDemo(){return Object.keys(S.files).length>0&&Object.keys(S.files).every(function(k){return S.files[k].isDemo;});}

function filterRows(rows,headers){
  var mp=S.mappings['ventas']||{};
  var fC=headers.find(function(h){return mp[h]==='fecha';}),clC=headers.find(function(h){return mp[h]==='cliente';}),prC=headers.find(function(h){return mp[h]==='producto';});
  return rows.filter(function(r){
    if(S.kpiFilters.meses.length&&fC&&!S.kpiFilters.meses.some(function(m){return r[fC]===m;}))return false;
    if(S.kpiFilters.cliente&&clC&&r[clC]!==S.kpiFilters.cliente)return false;
    if(S.kpiFilters.producto&&prC&&r[prC]!==S.kpiFilters.producto)return false;
    return true;
  });
}
function computeFromFiles(useFilters){
  var vf=S.files['ventas'];if(!vf||!vf.rows||!vf.rows.length)return null;
  var mp=S.mappings['ventas']||{};
  function colFor(cat){return vf.headers.find(function(h){return mp[h]===cat;})||null;}
  var vC=colFor('ventas'),cC=colFor('costos'),clC=colFor('cliente'),prC=colFor('producto'),fC=colFor('fecha');
  var rows=useFilters?filterRows(vf.rows,vf.headers):vf.rows;
  var clients={},prods={},cats={},months={};
  rows.forEach(function(r){
    var cl=clC?r[clC]:'?',pr=prC?r[prC]:'?',mes=fC?r[fC]:'—',v=num(vC?r[vC]:0),c=num(cC?r[cC]:0);
    if(!clients[cl])clients[cl]={nombre:cl,ventas:0,costo:0};clients[cl].ventas+=v;clients[cl].costo+=c;
    if(!prods[pr])prods[pr]={nombre:pr,ventas:0,costo:0};prods[pr].ventas+=v;prods[pr].costo+=c;
    if(!cats[pr])cats[pr]={cat:pr,ventas:0,costo:0};cats[pr].ventas+=v;cats[pr].costo+=c;
    if(!months[mes])months[mes]={mes:mes,ventas:0,costos:0};months[mes].ventas+=v;months[mes].costos+=c;
  });
  var addMg=function(o){return Object.assign({},o,{ganancia:o.ventas-o.costo,margen:o.ventas?Math.round((1-o.costo/o.ventas)*100):0});};
  var cArr=Object.values(clients).sort(function(a,b){return b.ventas-a.ventas;}).map(addMg);
  var pArr=Object.values(prods).sort(function(a,b){return b.ventas-a.ventas;}).map(addMg);
  var catArr=Object.values(cats).sort(function(a,b){return b.ventas-a.ventas;}).map(function(c){return Object.assign({},c,{ganancia:c.ventas-c.costo,margen:c.ventas?Math.round((1-c.costo/c.ventas)*100):0});});
  var mArr=Object.values(months);
  var df=S.files['directos'],totDir=0,dirByProv={},dirByCat={},dirByMes={};
  if(df&&df.rows){
    var mp2=S.mappings['directos']||{};
    var mc2=df.headers.find(function(h){return mp2[h]==='costos';});
    var mpv2=df.headers.find(function(h){return mp2[h]==='proveedor';});
    var mct2=df.headers.find(function(h){return mp2[h]==='producto';});
    var mf2=df.headers.find(function(h){return mp2[h]==='fecha';});
    df.rows.forEach(function(r){var v=mc2?num(r[mc2]):0;totDir+=v;var pv=mpv2?r[mpv2]:'?',ct=mct2?r[mct2]:'?',ms=mf2?r[mf2]:'—';if(!dirByProv[pv])dirByProv[pv]={nombre:pv,monto:0};dirByProv[pv].monto+=v;if(!dirByCat[ct])dirByCat[ct]={cat:ct,monto:0};dirByCat[ct].monto+=v;if(!dirByMes[ms])dirByMes[ms]={mes:ms,monto:0};dirByMes[ms].monto+=v;});
  }
  var ff=S.files['fijos'],totFij=0,fijByProv={},fijByCat={},fijByMes={};
  if(ff&&ff.rows){
    var mp3=S.mappings['fijos']||{};
    var mc3=ff.headers.find(function(h){return mp3[h]==='costos';});
    var mpv3=ff.headers.find(function(h){return mp3[h]==='proveedor';});
    var mct3=ff.headers.find(function(h){return mp3[h]==='producto';});
    var mf3=ff.headers.find(function(h){return mp3[h]==='fecha';});
    ff.rows.forEach(function(r){var v=mc3?num(r[mc3]):0;totFij+=v;var pv=mpv3?r[mpv3]:'?',ct=mct3?r[mct3]:'?',ms=mf3?r[mf3]:'—';if(!fijByProv[pv])fijByProv[pv]={nombre:pv,monto:0};fijByProv[pv].monto+=v;if(!fijByCat[ct])fijByCat[ct]={cat:ct,monto:0};fijByCat[ct].monto+=v;if(!fijByMes[ms])fijByMes[ms]={mes:ms,monto:0};fijByMes[ms].monto+=v;});
  }
  var mf2=S.files['manoobra'],totMOD=0;
  if(mf2&&mf2.rows)mf2.rows.forEach(function(r){totMOD+=num(r['Horas_trabajadas']||0)*num(r['Costo_hora']||0);});
  var totV=cArr.reduce(function(s,c){return s+c.ventas;},0);
  var totG=cArr.reduce(function(s,c){return s+c.ganancia;},0);
  var totVar=totV-totG,mgBruto=totV-totDir,mgContrib=mgBruto-totVar-totMOD,resultado=mgContrib-totFij;
  return{clients:cArr,products:pArr,categories:catArr,months:mArr,totV:totV,totG:totG,totDir:totDir,totFij:totFij,totMOD:totMOD,totVar:totVar,mgBruto:mgBruto,mgContrib:mgContrib,resultado:resultado,
    dirByProv:Object.values(dirByProv).sort(function(a,b){return b.monto-a.monto;}),dirByCat:Object.values(dirByCat).sort(function(a,b){return b.monto-a.monto;}),dirByMes:Object.values(dirByMes),
    fijByProv:Object.values(fijByProv).sort(function(a,b){return b.monto-a.monto;}),fijByCat:Object.values(fijByCat).sort(function(a,b){return b.monto-a.monto;}),fijByMes:Object.values(fijByMes)};
}

        +'</div>';}).join('')+'</div>';

function renderMapeo(){
  var el=document.getElementById('page-mapeo');if(!el)return;
  var keys=Object.keys(S.files);
  if(!keys.length){el.innerHTML='<div class="page-wrap"><div class="note-y">No hay archivos cargados. <button class="btng" onclick="nav(\'archivos\')">Ir a Archivos →</button></div></div>';return;}
  var active=S.mapTab&&S.files[S.mapTab]?S.mapTab:keys[0];
  var fd=S.files[active],mapping=S.mappings[active]||{};
  var mc=Object.values(mapping).filter(function(v){return v&&v!=='';}).length;
  var html='<div class="page-wrap"><div class="page-header"><div class="page-title">Mapeo de columnas</div><div class="page-sub">Verificá que cada columna esté bien categorizada. Los cambios actualizan el dashboard en tiempo real.</div></div>'
    +'<div class="col-tabs">'+keys.map(function(k){var mod=MODULES.find(function(m){return m.id===k;})||{icon:'',title:k};var done=Object.values(S.mappings[k]||{}).some(function(v){return v&&v!=='';});return'<div class="col-tab'+(k===active?' active':done?' done':'')+'" onclick="setMapTab(\''+k+'\')">'+mod.icon+' '+mod.title+(S.files[k].isDemo?' 📋':'')+'</div>';}).join('')+'</div>'
    +'<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh)">'
    +'<div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">'
    +'<div><div style="font-size:12px;font-weight:600">'+fd.name+'</div><div style="font-size:10px;color:var(--t3)">'+fd.rows.length+' filas · '+fd.headers.length+' columnas · '+mc+' categorizados</div></div>'
    +'<button class="btng" onclick="nav(\'archivos\')">← Cambiar archivo</button></div>'
    +'<div style="padding:14px 18px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><span style="font-size:11px;font-weight:600">Vista previa</span><span style="font-size:10px;color:var(--t3)">'+Math.min(3,fd.rows.length)+' de '+fd.rows.length+'</span></div>'
    +'<div class="tscroll" style="border:1px solid var(--border);border-radius:var(--rs)"><table><thead><tr>'+fd.headers.map(function(h){return'<th>'+h+'</th>';}).join('')+'</tr></thead><tbody>'+fd.rows.slice(0,3).map(function(r){return'<tr>'+fd.headers.map(function(h){return'<td>'+(r[h]||'')+'</td>';}).join('')+'</tr>';}).join('')+'</tbody></table></div></div>'
    +'<div style="padding:0 18px;border-top:1px solid var(--border);padding-top:12px"><div style="font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:8px">Categorización</div></div>'
    +'<div class="col-grid" style="padding:0 18px 18px">'
    +fd.headers.map(function(col){var val=mapping[col]||'';var cat=CATS.find(function(c){return c.v===val;});var sample=fd.rows.slice(0,3).map(function(r){return r[col];}).filter(Boolean).join(', ');
      return'<div class="col-card'+(val?' mapped':'')+'">'
        +'<div class="col-name" title="'+col+'">'+col+'</div><div class="col-sample">'+( sample||'—')+'</div>'
        +'<select onchange="setMap(\''+active+'\',\''+col+'\',this.value)">'+CATS.map(function(c){return'<option value="'+c.v+'"'+(val===c.v?' selected':'')+'>'+c.l+'</option>';}).join('')+'</select>'
        +(val&&cat?'<div class="cbadge '+cat.b+'">'+cat.l+'</div>':'')+'</div>';}).join('')+'</div>'
    +'<div class="savebar"><span style="font-size:11px;color:var(--accent)">✓ Cambios guardados automáticamente</span><button class="btn sm" onclick="nav(\'dashboard\')">Ver Dashboard →</button></div></div></div>';
  el.innerHTML=html;
}

// ══════════════════════════════════════════════════════
// PAGE: DASHBOARD
// ══════════════════════════════════════════════════════
function renderDashboard(){
  var el=document.getElementById('page-dashboard');if(!el)return;
  var d=computeFromFiles(false);
  if(!d){el.innerHTML='<div class="page-wrap"><div class="empty"><div class="empty-icon">📊</div><div class="empty-title">Sin datos</div><div class="empty-sub">Cargá al menos el archivo de Ventas para ver el dashboard.</div><button class="btn" onclick="nav(\'archivos\')">Ir a Archivos →</button></div></div>';return;}
  var html='';
  if(allDemo())html+='<div class="demo-bar">📋 Mostrando datos de ejemplo — <button class="btng" onclick="nav(\'archivos\')">cargá tus datos</button> o <button class="btng" onclick="removeAllDemo()">borrá los ejemplos</button></div>';
  html+='<div class="dash-header">'
    +'<div style="font-size:14px;font-weight:600;letter-spacing:-.01em">Dashboard</div>'
    +'<div class="dash-toggle">'
    +[{id:'clientes',l:'Clientes'},{id:'productos',l:'Productos'},{id:'costos',l:'Costos'},{id:'pnl',l:'P&L'}]
    .map(function(t){return'<button class="dtab'+(S.dashView===t.id?' active':'')+'" onclick="setDV(\''+t.id+'\')">'+t.l+'</button>';}).join('')
    +'</div></div>';
  var W=Math.min(1100,(document.documentElement.clientWidth||1000)-240);
  var Wh=Math.max(280,Math.round(W/2)-10);
  html+='<div class="kpi-row">'
    +'<div class="kpi-tile"><div class="kpi-label">Ventas totales</div><div class="kpi-val">'+fmtK(d.totV)+'</div><div class="kpi-delta up">'+d.clients.length+' clientes activos</div></div>'
    +'<div class="kpi-tile"><div class="kpi-label">Margen bruto</div><div class="kpi-val up">'+fmtK(d.totG)+'</div><div class="kpi-delta up">'+pct(d.totG,d.totV)+'% sobre ventas</div></div>'
    +'<div class="kpi-tile"><div class="kpi-label">Resultado operativo</div><div class="kpi-val '+(d.resultado>0?'up':'dn')+'">'+fmtK(d.resultado)+'</div><div class="kpi-delta '+(d.resultado>0?'up':'dn')+'">'+pct(d.resultado,d.totV)+'% margen neto</div></div>'
    +'<div class="kpi-tile"><div class="kpi-label">Total costos</div><div class="kpi-val warn">'+fmtK(d.totDir+d.totVar+d.totMOD+d.totFij)+'</div><div class="kpi-delta warn">'+pct(d.totDir+d.totVar+d.totMOD+d.totFij,d.totV)+'% sobre ventas</div></div>'
    +'</div>';
  html+='<div class="dash-body">';
  if(S.dashView==='clientes')html+=renderClientes(d,W,Wh);
  else if(S.dashView==='productos')html+=renderProductos(d,W,Wh);
  else if(S.dashView==='costos')html+=renderCostos(d,W,Wh);
  else html+=renderPnL(d,W);
  html+=renderChartBuilder(d,W)+'</div>';
  el.innerHTML=html;S.tip=null;
  setTimeout(function(){drawChart(d);},60);
}

function renderClientes(d,W,Wh){
  var maxV=d.clients.length?d.clients[0].ventas:1;
  var seg1=d.clients[0]||{ventas:0,ganancia:0,nombre:'—'};
  var restV=d.clients.slice(1).reduce(function(s,c){return s+c.ventas;},0),restG=d.clients.slice(1).reduce(function(s,c){return s+c.ganancia;},0);
  var segData=[{seg:(seg1.nombre||'').split(' ')[0],ventas:seg1.ventas,ganancia:seg1.ganancia}];
  if(d.clients[1])segData.splice(1,0,{seg:(d.clients[1].nombre||'').split(' ')[0],ventas:d.clients[1].ventas,ganancia:d.clients[1].ganancia});
  segData.push({seg:'Resto',ventas:restV,ganancia:restG});
  return'<div class="chart-grid">'
    +'<div class="chart-card chart-full"><div class="chart-title">Ventas vs costos por período</div><div class="chart-sub">Área entre curvas = margen bruto del período</div>'
    +'<div class="legrow"><div class="legitem"><div class="legdot" style="background:#1C3F2C"></div>Ventas</div><div class="legitem"><div class="legdot" style="background:#B84020"></div>Costos</div></div>'
    +areaChart(d.months,W,180)+'</div>'
    +'<div class="chart-card"><div class="chart-title">Top clientes</div><div class="chart-sub">Por facturación y margen bruto</div>'
    +'<div class="tscroll"><table><thead><tr><th>#</th><th>Cliente</th><th class="r">Ventas</th><th class="r">Margen</th></tr></thead><tbody>'
    +d.clients.slice(0,10).map(function(c,i){return'<tr><td><span class="rankn">#'+(i+1)+'</span></td><td><div style="font-weight:'+(i<2?600:400)+';font-size:11px">'+c.nombre+'</div><div class="bar-inl" style="width:'+Math.round(c.ventas/maxV*100)+'%;background:'+(i===0?'#B84020':i===1?'#A07010':'#1C3F2C')+'"></div></td><td class="r">'+fmtK(c.ventas)+'</td><td class="r"><span class="mgb '+getMgC(c.margen)+'">'+c.margen+'%</span></td></tr>';}).join('')
    +'</tbody></table></div></div>'
    +'<div class="chart-card"><div class="chart-title">Ganancia por segmento</div><div class="chart-sub">Ventas vs ganancia real</div>'
    +'<div class="legrow"><div class="legitem"><div class="legdot" style="background:var(--al);border:1px solid var(--accent)"></div>Ventas</div><div class="legitem"><div class="legdot" style="background:var(--accent)"></div>Ganancia</div></div>'
    +barChartSimple(segData,Wh,150)
    +(d.clients.length?'<div class="ibox">💡 <strong>'+seg1.nombre+'</strong> representa el '+pct(seg1.ventas,d.totV)+'% de ventas con '+seg1.margen+'% de margen.</div>':'')
    +'</div></div>';
}

function renderProductos(d,W,Wh){
  var maxV=d.products.length?d.products[0].ventas:1;
  var catSeg=d.categories.slice(0,4).map(function(c){return{seg:c.cat,ventas:c.ventas,ganancia:c.ganancia};});
  return'<div class="chart-grid">'
    +'<div class="chart-card"><div class="chart-title">Top productos</div><div class="chart-sub">Por facturación y margen</div>'
    +'<div class="tscroll"><table><thead><tr><th>#</th><th>Producto</th><th class="r">Ventas</th><th class="r">Margen</th></tr></thead><tbody>'
    +d.products.slice(0,10).map(function(p,i){var cs=['#B84020','#C4531A','#1C3F2C','#1A3A6B','#5C2D8A'];return'<tr><td><span class="rankn">#'+(i+1)+'</span></td><td><div style="font-size:11px;font-weight:'+(i<3?600:400)+'">'+p.nombre+'</div><div class="bar-inl" style="width:'+Math.round(p.ventas/maxV*100)+'%;background:'+cs[i%5]+'"></div></td><td class="r">'+fmtK(p.ventas)+'</td><td class="r"><span class="mgb '+getMgC(p.margen)+'">'+p.margen+'%</span></td></tr>';}).join('')
    +'</tbody></table></div></div>'
    +'<div class="chart-card"><div class="chart-title">Ventas vs ganancia por categoría</div><div class="chart-sub">Comparativo por línea</div>'
    +'<div class="legrow"><div class="legitem"><div class="legdot" style="background:var(--al);border:1px solid var(--accent)"></div>Ventas</div><div class="legitem"><div class="legdot" style="background:var(--accent)"></div>Ganancia</div></div>'
    +barChartSimple(catSeg,Wh,170)+'</div>'
    +'<div class="chart-card chart-full"><div class="chart-title">Margen por categoría</div><div class="chart-sub">Rentabilidad comparativa</div>'
    +'<div class="tscroll"><table><thead><tr><th>Categoría</th><th class="r">Ventas</th><th class="r">Costo</th><th class="r">Ganancia</th><th class="r">Margen</th></tr></thead><tbody>'
    +d.categories.map(function(c){return'<tr><td style="font-weight:500">'+c.cat+'</td><td class="r">'+fmtK(c.ventas)+'</td><td class="r" style="color:var(--red)">'+fmtK(c.costo)+'</td><td class="r" style="color:var(--accent)">'+fmtK(c.ganancia)+'</td><td class="r"><span class="mgb '+getMgC(c.margen)+'">'+c.margen+'%</span></td></tr>';}).join('')
    +'</tbody></table></div></div></div>';
}

function renderCostos(d,W,Wh){
  var totC=d.totDir+d.totVar+d.totMOD+d.totFij;
  var allProv={};
  d.dirByProv.forEach(function(p){if(!allProv[p.nombre])allProv[p.nombre]={nombre:p.nombre,monto:0};allProv[p.nombre].monto+=p.monto;});
  d.fijByProv.forEach(function(p){if(!allProv[p.nombre])allProv[p.nombre]={nombre:p.nombre,monto:0};allProv[p.nombre].monto+=p.monto;});
  var provArr=Object.values(allProv).sort(function(a,b){return b.monto-a.monto;});
  var maxP=provArr.length?provArr[0].monto:1;
  var allCats={};
  d.dirByCat.forEach(function(c){if(!allCats[c.cat])allCats[c.cat]={cat:c.cat,monto:0};allCats[c.cat].monto+=c.monto;});

  d.fijByMes.forEach(function(m){if(!mesCostos[m.mes])mesCostos[m.mes]={mes:m.mes,ventas:0,costos:0};mesCostos[m.mes].costos+=m.monto;});
  var mesArr=Object.values(mesCostos);
  return'<div class="chart-grid">'
    +'<div class="chart-card chart-full"><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">'
    +'<div class="kpi-tile" style="border:none;background:var(--rl)"><div class="kpi-label">Costos directos</div><div class="kpi-val dn">'+fmtK(d.totDir)+'</div><div class="kpi-delta">'+pct(d.totDir,d.totV)+'% ventas</div></div>'
    +'<div class="kpi-tile" style="border:none;background:var(--gl)"><div class="kpi-label">Costos variables</div><div class="kpi-val warn">'+fmtK(d.totVar)+'</div><div class="kpi-delta">'+pct(d.totVar,d.totV)+'% ventas</div></div>'
    +'<div class="kpi-tile" style="border:none;background:var(--gl)"><div class="kpi-label">Mano de obra</div><div class="kpi-val warn">'+fmtK(d.totMOD)+'</div><div class="kpi-delta">'+pct(d.totMOD,d.totV)+'% ventas</div></div>'
    +'<div class="kpi-tile" style="border:none;background:var(--bl)"><div class="kpi-label">Costos fijos</div><div class="kpi-val" style="color:var(--blue)">'+fmtK(d.totFij)+'</div><div class="kpi-delta">'+pct(d.totFij,d.totV)+'% ventas</div></div>'
    +'</div></div>'
    +'<div class="chart-card"><div class="chart-title">Top proveedores</div><div class="chart-sub">Total facturado (directos + fijos)</div>'
    +'<div class="tscroll"><table><thead><tr><th>#</th><th>Proveedor</th><th class="r">Monto</th><th class="r">%</th></tr></thead><tbody>'
    +provArr.slice(0,10).map(function(p,i){return'<tr><td><span class="rankn">#'+(i+1)+'</span></td><td><div style="font-size:11px;font-weight:'+(i<2?600:400)+'">'+p.nombre+'</div><div class="bar-inl" style="width:'+Math.round(p.monto/maxP*100)+'%;background:'+(i===0?'#B84020':i===1?'#A07010':'#1A3A6B')+'"></div></td><td class="r">'+fmtK(p.monto)+'</td><td class="r" style="font-family:var(--mono);font-size:10px;color:var(--t3)">'+pct(p.monto,totC)+'%</td></tr>';}).join('')
    +'</tbody></table></div></div>'
    +'<div class="chart-card"><div class="chart-title">Costos por categoría</div><div class="chart-sub">Directos + fijos por tipo</div>'
    +'<div class="tscroll"><table><thead><tr><th>Categoría</th><th class="r">Monto</th><th class="r">%</th></tr></thead><tbody>'
    +catArr.map(function(c){return'<tr><td style="font-weight:500">'+c.cat+'</td><td class="r">'+fmtK(c.monto)+'</td><td class="r"><div style="display:flex;align-items:center;gap:6px;justify-content:flex-end"><div style="width:50px;background:var(--bg);border-radius:2px;height:5px;overflow:hidden"><div style="background:var(--red);width:'+pct(c.monto,totC)+'%;height:100%;border-radius:2px"></div></div><span style="font-family:var(--mono);font-size:10px;color:var(--t3)">'+pct(c.monto,totC)+'%</span></div></td></tr>';}).join('')
    +'</tbody></table></div></div>'
    +(mesArr.length?'<div class="chart-card chart-full"><div class="chart-title">Evolución de costos</div><div class="chart-sub">Costos directos y fijos por período</div>'+areaChart(mesArr,W,160)+'</div>':'')
    +'</div>';
}

function renderPnL(d,W){
  var be=d.totFij&&d.mgContrib&&d.totV?Math.round(d.totFij/(d.mgContrib/d.totV)):0;
  return'<div class="chart-grid">'

    +'</table></div>'
    +'<div class="chart-card"><div class="chart-title">Estructura de costos</div><div class="chart-sub">Composición sobre ventas totales</div>'
    +'<table style="width:100%;font-size:11px;border-collapse:collapse"><tbody>'
    +[{l:'Costos directos',v:d.totDir,c:'#B84020'},{l:'Costos variables',v:d.totVar,c:'#C4531A'},{l:'Mano de obra',v:d.totMOD,c:'#D4703A'},{l:'Costos fijos',v:d.totFij,c:'#A07010'},{l:'Resultado op.',v:Math.max(0,d.resultado),c:'#1C3F2C'}]
    .map(function(r){var p2=pct(r.v,d.totV);return'<tr style="border-bottom:1px solid var(--border)"><td style="padding:6px 10px">'+r.l+'</td><td style="padding:6px 10px;text-align:right;font-family:var(--mono);font-size:10px">'+fmtK(r.v)+'</td><td style="padding:6px 10px;width:90px"><div style="background:var(--bg);border-radius:2px;height:6px;overflow:hidden"><div style="background:'+r.c+';width:'+p2+'%;height:100%;border-radius:2px"></div></div></td><td style="padding:6px 10px;font-size:10px;color:var(--t3);font-family:var(--mono)">'+p2+'%</td></tr>';}).join('')
    +'</tbody></table>'
    +(be>0?'<div class="ibox" style="margin-top:12px">📍 <strong>Punto de equilibrio:</strong> '+fmtK(be)+' en ventas para cubrir costos fijos.</div>':'')
    +'</div></div>';
}
</script>
<script>
// ══════════════════════════════════════════════════════
// CHART BUILDER
// ══════════════════════════════════════════════════════
var COLORS=['#1C3F2C','#B84020','#1A3A6B','#A07010','#5C2D8A','#0A6058','#8B3010','#0E2A5A','#705008','#3A1A5A'];

function renderChartBuilder(d,W){
  var cb=S.cb,allF=(S.files['ventas']||{headers:[]}).headers;
  function fsel(val,ph,onch){
    return'<select style="width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--rs);padding:4px 6px;font-size:11px;font-family:var(--font);color:var(--text);cursor:pointer;outline:none;" onchange="'+onch+'">'
      +'<option value="">'+ph+'</option><option value="__margen__"'+(val==='__margen__'?' selected':'')+'>Margen %</option>'
      +allF.map(function(f){return'<option value="'+f+'"'+(val===f?' selected':'')+'>'+f+'</option>';}).join('')+'</select>';
  }
  function sortSel(){
    return'<div><div class="cb-lbl">Ordenar por</div><select style="width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--rs);padding:4px 6px;font-size:11px;font-family:var(--font);color:var(--text);cursor:pointer;outline:none;" onchange="setCB(\'sortBy\',this.value)">'
      +['val_desc','val_asc','name_asc','name_desc'].map(function(a){return'<option value="'+a+'"'+(cb.sortBy===a?' selected':'')+'>'+{val_desc:'Mayor a menor',val_asc:'Menor a mayor',name_asc:'Cronológico / A→Z',name_desc:'Cronológico inv. / Z→A'}[a]+'</option>';}).join('')+'</select></div>';
  }
  var fields='';
  if(cb.type==='scatter'){
    fields='<div><div class="cb-lbl">Eje X</div>'+fsel(cb.xField,'— campo —',"setCB('xField',this.value)")+'</div>'
      +'<div><div class="cb-lbl">Eje Y</div>'+fsel(cb.yField,'— campo —',"setCB('yField',this.value)")+'</div>'
      +'<div><div class="cb-lbl">Color</div>'+fsel(cb.colorField,'— opcional —',"setCB('colorField',this.value)")+'</div>';
  }else if(cb.type==='pie'){
    fields='<div><div class="cb-lbl">Segmento</div>'+fsel(cb.xField,'— campo —',"setCB('xField',this.value)")+'</div>'
      +'<div><div class="cb-lbl">Valor</div>'+fsel(cb.yField,'— campo —',"setCB('yField',this.value)")+'</div>'+sortSel();
  }else{
    fields='<div><div class="cb-lbl">Eje X</div>'+fsel(cb.xField,'— campo —',"setCB('xField',this.value)")+'</div>'
      +'<div><div class="cb-lbl">Eje Y principal</div>'+fsel(cb.yField,'— campo —',"setCB('yField',this.value)")+'</div>'
      +'<div><div class="cb-lbl">Eje Y secundario</div>'+fsel(cb.y2Field,'— opcional —',"setCB('y2Field',this.value)")+'</div>'
      +'<div><div class="cb-lbl">Agregación</div><select style="width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--rs);padding:4px 6px;font-size:11px;font-family:var(--font);color:var(--text);cursor:pointer;outline:none;" onchange="setCB(\'aggr\',this.value)">'
      +['sum','avg','count'].map(function(a){return'<option value="'+a+'"'+(cb.aggr===a?' selected':'')+'>'+{sum:'Suma',avg:'Promedio',count:'Conteo'}[a]+'</option>';}).join('')+'</select></div>'
      +sortSel()
      +(cb.type==='bar'?'<div><div class="cb-lbl">Orientación</div><div style="display:flex;gap:5px">'
        +[{v:'vertical',l:'↑'},{v:'horizontal',l:'→'}].map(function(o){return'<button onclick="setCB(\'orient\',\''+o.v+'\')" style="flex:1;padding:5px;border:1px solid '+(cb.orient===o.v?'var(--accent)':'var(--border)')+';border-radius:var(--rs);background:'+(cb.orient===o.v?'var(--al)':'var(--surface)')+';cursor:pointer;font-size:11px;font-family:var(--font);color:'+(cb.orient===o.v?'var(--accent)':'var(--t2)')+'">'+o.l+' '+o.v+'</button>';}).join('')+'</div></div>':'');
  }
  return'<div class="cb-wrap"><div class="chart-title" style="margin-bottom:2px">Constructor de gráficas</div><div class="chart-sub" style="margin-bottom:14px">Elegí tipo, campos y ejes — actualiza en tiempo real</div>'
    +'<div class="cb-types">'
    +[{id:'bar',l:'Barras'},{id:'line',l:'Línea'},{id:'scatter',l:'Scatter'},{id:'pie',l:'Torta'}]
    .map(function(t){return'<button class="cb-type'+(cb.type===t.id?' active':'')+'" onclick="setCB(\'type\',\''+t.id+'\')">'+t.l+'</button>';}).join('')+'</div>'
    +'<div class="cb-fields">'+fields+'</div>'
    +'<div class="cb-chart" id="cb-chart"><span style="color:var(--t3);font-size:11px">Configurá los campos para ver la gráfica</span></div></div>';
}

function setCB(key,val){S.cb[key]=val;persist();renderDashboard();}

function aggrData(xCol,yCol,aggr){
  var f=S.files['ventas'];if(!f||!xCol||!yCol)return[];
  var isM=yCol==='__margen__',mp=S.mappings['ventas']||{};
  var vC=f.headers.find(function(h){return mp[h]==='ventas';}),cC=f.headers.find(function(h){return mp[h]==='costos';});
  var map={};
  f.rows.forEach(function(r){var dim=r[xCol]||'—',val=isM?0:num(r[yCol]||0),v=isM?num(r[vC]||0):0,c=isM?num(r[cC]||0):0;
    if(!map[dim])map[dim]={dim:dim,val:0,venta:0,costo:0,count:0};map[dim].val+=val;map[dim].venta+=v;map[dim].costo+=c;map[dim].count++;});
  var arr=Object.values(map).map(function(r){if(isM)return{dim:r.dim,val:r.venta?Math.round((1-r.costo/r.venta)*100):0,count:r.count};if(aggr==='avg')return{dim:r.dim,val:r.count?r.val/r.count:0,count:r.count};if(aggr==='count')return{dim:r.dim,val:r.count,count:r.count};return{dim:r.dim,val:r.val,count:r.count};});
  var MES=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  function fv(s){var st=String(s).toLowerCase();var q=st.match(/q(\d)/);if(q)return parseInt(q[1]);var my=st.match(/([a-z]+)[-\/](\d{4})/);if(my)return parseInt(my[2])*100+MES.indexOf(my[1].substring(0,3));var y=st.match(/^(\d{4})$/);if(y)return parseInt(y[1])*100;var mi=MES.indexOf(st.substring(0,3));if(mi>=0)return mi;return 0;}
  var sb=S.cb.sortBy||'val_desc';
  if(sb==='val_desc')arr.sort(function(a,b){return b.val-a.val;});else if(sb==='val_asc')arr.sort(function(a,b){return a.val-b.val;});else if(sb==='name_asc')arr.sort(function(a,b){var fa=fv(a.dim),fb=fv(b.dim);return(fa||fb)?fa-fb:String(a.dim).localeCompare(String(b.dim));});else if(sb==='name_desc')arr.sort(function(a,b){var fa=fv(a.dim),fb=fv(b.dim);return(fa||fb)?fb-fa:String(b.dim).localeCompare(String(a.dim));});
  return arr.slice(0,20);
}
function aggrXY(dimCol,xCol,yCol){var f=S.files['ventas'];if(!f||!xCol||!yCol)return[];return f.rows.map(function(r){return{dim:dimCol?r[dimCol]||'—':'',x:num(r[xCol]||0),y:num(r[yCol]||0)};});}

function drawChart(d){
  var el=document.getElementById('cb-chart');if(!el)return;
  var cb=S.cb,f=S.files['ventas'];
  if(!f){el.innerHTML='<span style="color:var(--t3);font-size:11px">Cargá Ventas para usar el constructor</span>';return;}
  if(!cb.xField&&!cb.yField){el.innerHTML='<span style="color:var(--t3);font-size:11px">Elegí los campos para ver la gráfica</span>';return;}
  var W=el.offsetWidth||640,H=250;
  if(cb.type==='scatter')drawScatter(el,cb,W,H);else if(cb.type==='pie')drawPie(el,cb,W,H);else if(cb.type==='line')drawLine(el,cb,W,H);else drawBar(el,cb,W,H);
}

function svgB(w,h){return'<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:'+h+'px;display:block;overflow:visible">';}
function gridH(pad,cw,ch,maxV,isPct){var s='';[0,.25,.5,.75,1].forEach(function(p){var y=(pad.t+ch-p*ch).toFixed(1);var lbl=isPct?Math.round(maxV*p)+'%':fmtK(maxV*p);s+='<line x1="'+pad.l+'" y1="'+y+'" x2="'+(pad.l+cw)+'" y2="'+y+'" stroke="var(--border)" stroke-dasharray="2 3"/><text x="'+(pad.l-4)+'" y="'+y+'" text-anchor="end" dominant-baseline="central" fill="var(--t3)" font-size="9" font-family="var(--mono)">'+lbl+'</text>';});return s;}

function drawBar(el,cb,W,H){
  if(!cb.xField||!cb.yField){el.innerHTML='<span style="color:var(--t3);font-size:11px">Elegí Eje X y Eje Y</span>';return;}
  var isPct=cb.yField==='__margen__',data=aggrData(cb.xField,cb.yField,cb.aggr);
  var data2=cb.y2Field?aggrData(cb.xField,cb.y2Field,cb.aggr):[];var map2={};data2.forEach(function(r){map2[r.dim]=r.val;});
  var horiz=cb.orient==='horizontal',pad=horiz?{t:8,r:80,b:8,l:120}:{t:16,r:8,b:48,l:52};
  var cw=W-pad.l-pad.r,ch=H-pad.t-pad.b,n=Math.min(data.length,horiz?12:14);
  var maxV=Math.max.apply(null,data.slice(0,n).map(function(r){return r.val;}).concat(cb.y2Field?data.slice(0,n).map(function(r){return map2[r.dim]||0;}):[]))*1.1||1;
  var bw=horiz?ch/n:cw/n,gap=3,bwi=cb.y2Field?Math.floor((bw-gap*3)/2):Math.max(5,Math.floor(bw-gap*2));
  var svg=svgB(W,H);if(!horiz)svg+=gridH(pad,cw,ch,maxV,isPct);
  else{[0,.25,.5,.75,1].forEach(function(p){var x2=(pad.l+p*cw).toFixed(1);svg+='<line x1="'+x2+'" y1="'+pad.t+'" x2="'+x2+'" y2="'+(pad.t+ch)+'" stroke="var(--border)" stroke-dasharray="2 3"/><text x="'+x2+'" y="'+(pad.t+ch+12)+'" text-anchor="middle" fill="var(--t3)" font-size="9" font-family="var(--mono)">'+(isPct?Math.round(maxV*p)+'%':fmtK(maxV*p))+'</text>';});}
  data.slice(0,n).forEach(function(r,i){
    var h1=Math.max(2,Math.round((r.val/maxV)*(horiz?cw:ch))),h2=cb.y2Field?Math.max(1,Math.round(((map2[r.dim]||0)/maxV)*(horiz?cw:ch))):0;
    var lbl=String(r.dim).length>15?String(r.dim).substring(0,14)+'…':String(r.dim);
    var bc=isPct?(r.val>=35?'#1C3F2C':r.val>=28?'#A07010':'#B84020'):COLORS[0];
    if(horiz){var y0=pad.t+i*bw+gap;svg+='<rect x="'+pad.l+'" y="'+y0+'" width="'+h1+'" height="'+bwi+'" fill="'+bc+'" rx="2"/>';if(cb.y2Field)svg+='<rect x="'+pad.l+'" y="'+(y0+bwi+gap)+'" width="'+h2+'" height="'+bwi+'" fill="'+COLORS[1]+'" rx="2"/>';svg+='<text x="'+(pad.l-5)+'" y="'+(y0+bwi/2)+'" text-anchor="end" dominant-baseline="central" fill="var(--t2)" font-size="9" font-family="var(--font)">'+lbl+'</text>';svg+='<text x="'+(pad.l+h1+4)+'" y="'+(y0+bwi/2)+'" dominant-baseline="central" fill="'+bc+'" font-size="9" font-weight="600" font-family="var(--mono)">'+(isPct?r.val+'%':fmtK(r.val))+'</text>';}
    else{var x0=pad.l+i*bw+gap;svg+='<rect x="'+x0+'" y="'+(pad.t+ch-h1)+'" width="'+bwi+'" height="'+h1+'" fill="'+bc+'" rx="2"/>';if(cb.y2Field)svg+='<rect x="'+(x0+bwi+gap)+'" y="'+(pad.t+ch-h2)+'" width="'+bwi+'" height="'+h2+'" fill="'+COLORS[1]+'" rx="2"/>';svg+='<text x="'+(x0+(cb.y2Field?bwi+gap/2:bwi/2)).toFixed(1)+'" y="'+(pad.t+ch+13)+'" text-anchor="middle" fill="var(--t3)" font-size="8" font-family="var(--font)">'+lbl+'</text>';}
  });
  svg+='</svg>';el.innerHTML=svg;
}

function drawLine(el,cb,W,H){
  if(!cb.xField||!cb.yField){el.innerHTML='<span style="color:var(--t3);font-size:11px">Elegí Eje X y Eje Y</span>';return;}
  var isPct=cb.yField==='__margen__',data=aggrData(cb.xField,cb.yField,cb.aggr);
  var data2=cb.y2Field?aggrData(cb.xField,cb.y2Field,cb.aggr):[];var map2={};data2.forEach(function(r){map2[r.dim]=r.val;});
  var pad={t:16,r:8,b:40,l:52},cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  if(!data.length){el.innerHTML='<span style="color:var(--t3);font-size:11px">Sin datos</span>';return;}
  var maxV=Math.max.apply(null,data.map(function(r){return r.val;}).concat(data2.map(function(r){return r.val;})))*1.1||1;
  var xs=data.map(function(_,i){return pad.l+(data.length>1?i/(data.length-1):0.5)*cw;});
  function yf(v){return pad.t+ch-(v/maxV)*ch;}
  var svg=svgB(W,H)+gridH(pad,cw,ch,maxV,isPct);
  data.forEach(function(r,i){var lbl=String(r.dim).length>9?String(r.dim).substring(0,8)+'…':String(r.dim);svg+='<text x="'+xs[i].toFixed(1)+'" y="'+(pad.t+ch+13)+'" text-anchor="middle" fill="var(--t3)" font-size="8" font-family="var(--font)">'+lbl+'</text>';});
  var p1='M'+xs.map(function(x,i){return x.toFixed(1)+','+yf(data[i].val).toFixed(1);}).join('L');

  if(cb.y2Field&&data2.length){var vals2=data.map(function(r){return map2[r.dim]||0;});var p2='M'+xs.map(function(x,i){return x.toFixed(1)+','+yf(vals2[i]).toFixed(1);}).join('L');svg+='<path d="'+p2+'" fill="none" stroke="'+COLORS[1]+'" stroke-width="2" stroke-linejoin="round" stroke-dasharray="5 3"/>';xs.forEach(function(x,i){svg+='<circle cx="'+x.toFixed(1)+'" cy="'+yf(vals2[i]).toFixed(1)+'" r="3" fill="'+COLORS[1]+'" stroke="#fff" stroke-width="1.5"/>';});}

function drawPie(el,cb,W,H){
  if(!cb.xField||!cb.yField){el.innerHTML='<span style="color:var(--t3);font-size:11px">Elegí Segmento y Valor</span>';return;}
  var data=aggrData(cb.xField,cb.yField,cb.aggr).slice(0,8),total=data.reduce(function(s,r){return s+r.val;},0)||1;
  var isPct=cb.yField==='__margen__',cx=Math.round(W*0.35),cy=H/2,r=Math.min(cy-16,cx-16,85);
  var svg=svgB(W,H),angle=-Math.PI/2;
  data.forEach(function(row,i){var sweep=2*Math.PI*(row.val/total),x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle),x2=cx+r*Math.cos(angle+sweep),y2=cy+r*Math.sin(angle+sweep);
    svg+='<path d="M'+cx+','+cy+' L'+x1.toFixed(1)+','+y1.toFixed(1)+' A'+r+','+r+' 0 '+(sweep>Math.PI?1:0)+',1 '+x2.toFixed(1)+','+y2.toFixed(1)+' Z" fill="'+COLORS[i%COLORS.length]+'" stroke="#fff" stroke-width="1.5"/>';
    var p2=Math.round(row.val/total*100),midA=angle+sweep/2,lx=cx+(r*0.65)*Math.cos(midA),ly=cy+(r*0.65)*Math.sin(midA);
    if(p2>6)svg+='<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="10" font-weight="600">'+p2+'%</text>';
    angle+=sweep;});

  svg+='<text x="'+cx+'" y="'+(cy-4)+'" text-anchor="middle" fill="var(--t2)" font-size="10">'+cb.xField+'</text>';
  svg+='<text x="'+cx+'" y="'+(cy+10)+'" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="700" font-family="var(--mono)">'+(isPct?Math.round(total/data.length)+'%':fmtK(total))+'</text>';
  var lx0=cx+r+16,ly0=cy-data.length*10;
  data.forEach(function(row,i){var lbl=String(row.dim).length>14?String(row.dim).substring(0,13)+'…':String(row.dim);svg+='<rect x="'+lx0+'" y="'+(ly0+i*20)+'" width="8" height="8" fill="'+COLORS[i%COLORS.length]+'" rx="1"/><text x="'+(lx0+12)+'" y="'+(ly0+i*20+7)+'" fill="var(--t2)" font-size="10">'+lbl+'</text><text x="'+(W-4)+'" y="'+(ly0+i*20+7)+'" text-anchor="end" fill="var(--t3)" font-size="9" font-family="var(--mono)">'+(isPct?row.val+'%':fmtK(row.val))+'</text>';});
  svg+='</svg>';el.innerHTML=svg;

function drawScatter(el,cb,W,H){
  if(!cb.xField||!cb.yField){el.innerHTML='<span style="color:var(--t3);font-size:11px">Elegí Eje X y Eje Y</span>';return;}
  var pts=aggrXY(cb.colorField,cb.xField,cb.yField);if(!pts.length){el.innerHTML='<span style="color:var(--t3);font-size:11px">Sin datos</span>';return;}
  var pad={t:16,r:8,b:36,l:52},cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  var maxX=Math.max.apply(null,pts.map(function(p){return p.x;}))*1.1||1,maxY=Math.max.apply(null,pts.map(function(p){return p.y;}))*1.1||1;
  function sx(v){return pad.l+(v/maxX)*cw;}function sy(v){return pad.t+ch-(v/maxY)*ch;}
  var dims={};pts.forEach(function(p){dims[p.dim]=1;});var dimList=Object.keys(dims),dimColor={};dimList.forEach(function(d2,i){dimColor[d2]=COLORS[i%COLORS.length];});
  var svg=svgB(W,H)+gridH(pad,cw,ch,maxY,false);
  [0,.25,.5,.75,1].forEach(function(p){var x2=sx(maxX*p).toFixed(1);svg+='<line x1="'+x2+'" y1="'+pad.t+'" x2="'+x2+'" y2="'+(pad.t+ch)+'" stroke="var(--border)" stroke-dasharray="2 3"/><text x="'+x2+'" y="'+(pad.t+ch+12)+'" text-anchor="middle" fill="var(--t3)" font-size="9" font-family="var(--mono)">'+fmtK(maxX*p)+'</text>';});
  pts.forEach(function(p){var col=cb.colorField?dimColor[p.dim]:COLORS[0];svg+='<circle cx="'+sx(p.x).toFixed(1)+'" cy="'+sy(p.y).toFixed(1)+'" r="4" fill="'+col+'" fill-opacity="0.7" stroke="'+col+'" stroke-width="0.5"/>';});
  var n=pts.length,sx2=0,sy2=0,sxy=0,sxx=0;pts.forEach(function(p){sx2+=p.x;sy2+=p.y;sxy+=p.x*p.y;sxx+=p.x*p.x;});
  var slope=(n*sxy-sx2*sy2)/(n*sxx-sx2*sx2)||0,intercept=(sy2-slope*sx2)/n;
  var x1t=0,y1t=slope*x1t+intercept,x2t=maxX/1.1,y2t=slope*x2t+intercept;
  svg+='<line x1="'+sx(x1t).toFixed(1)+'" y1="'+sy(y1t).toFixed(1)+'" x2="'+sx(x2t).toFixed(1)+'" y2="'+sy(y2t).toFixed(1)+'" stroke="'+COLORS[1]+'" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>';
  svg+='</svg>';el.innerHTML=svg;
}

// Static charts
function areaChart(data,w,h){

    +yticks.map(function(t){return'<line x1="'+pad.l+'" y1="'+t.y+'" x2="'+(pad.l+cw)+'" y2="'+t.y+'" stroke="var(--border)" stroke-dasharray="2 3"/><text x="'+(pad.l-4)+'" y="'+t.y+'" text-anchor="end" dominant-baseline="central" fill="var(--t3)" font-size="9" font-family="var(--mono)">'+t.val+'</text>';}).join('')

    +xs.map(function(x,i){var d=data[i],ty2=Math.min(yv(d),yc(d));return'<rect x="'+(x-11).toFixed(1)+'" y="'+pad.t+'" width="22" height="'+ch+'" fill="transparent" onmouseenter="S.tip={x:'+x.toFixed(1)+',y:'+ty2.toFixed(1)+',d:'+JSON.stringify(d)+'};renderDashboard()"/>';}).join('')

function barChartSimple(data,w,h){
